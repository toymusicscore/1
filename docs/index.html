<script>
  function login() {
    let uid0 = document.getElementById("uid").value;
    let pw0 = document.getElementById("pw").value;
    let pw1 = uid0+pw0;
    let pw2 = "";
    for (i = 0; i < pw1.length; i += 2){
        if (parseInt(pw1.substr(i,1)) < 3){
            pw2 = pw2 + String.fromCharCode(parseInt(1+pw1.substr(i, 2)));
        } else {
            pw2 = pw2 + String.fromCharCode(parseInt(pw1.substr(i, 2)));
        }
    }
    let url0 = 'https://www.toyscore.app/' + pw2;
        window.location = url0;
  }
</script>
