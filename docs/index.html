<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>index</title>
</head>
<body style="background-color:white;font-family:Arial;">
<h1>
<span style="
    font-family:Arial;
    font-size:32px;
    font-weight:bold;
    letter-spacing:-5px;
">
    <span style="color:#ff0000;">T</span>
    <span style="color:#ff7f00;">o</span>
    <span style="color:#ffff00;">y</span>
    <span style="color:#00ff00;">S</span>
    <span style="color:#00ffff;">c</span>
    <span style="color:#0000ff;">o</span>
    <span style="color:#ff00ff;">r</span>
    <span style="color:#ff007f;">e</span>
</span><sup style="font-size:12px;">&reg;</sup>
</h1>

<hr color="#ff0000">
<h2>
You can see note letters, fingering on the piano roll score.<br> 
You can generate fingering for your hands.<br>
You can upload your MIDI and fingering files.<br>
<br><div class="container">
<br>User ID
<br><input type="text" id="uid" class="textbox" placeholder="UserID">
<br><br>Password
<br><input type="password" id="upw" class="textbox" placeholder="Password">
<br><input type="button" value="Log in" class="button margin" onclick="login()">
</div>
<br>
By logging in, you agree to our  
<a href='https://www.toyscore.app/privacypolicy.html'>Privacy Policy</a> and 
<a href='https://www.toyscore.app/termsandconditions.html'>Terms and Conditions</a>.
<br>
</h2>
<script>
  function login() {
    let uid0 = document.getElementById("uid").value;
    let upw0 = document.getElementById("upw").value;
    let upw1 = uid0+upw0;
    let upw2 = "";
    for (let i = 0; i < upw1.length; i += 2){
        if (parseInt(upw1.substr(i,1)) < 3){
            upw2 = upw2 + String.fromCharCode(parseInt(1+upw1.substr(i, 2)));
        } else {
            upw2 = upw2 + String.fromCharCode(parseInt(upw1.substr(i, 2)));
        }
    }
    let url0 = 'https://www.toyscore.app/' + upw2;
        window.location = url0;
  }
</script>
</body>
</html>
