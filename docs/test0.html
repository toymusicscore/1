let startTime = 0;
let isPlaying = false;
let isDrawing = false;

async function start(parsedData){
	await picoAudio.context.resume();
	isPlaying = true;
	isDrawing = true;
	picoAudio.init();
	picoAudio.setData(parsedData);
	picoAudio.play();
	startTime = picoAudio.context.currentTime;
	requestAnimationFrame(loop);
}

function stop(){
	isPlaying = false;
	isDrawing = false;
	picoAudio.stop();
}

function loop(){
	if (isPlaying) return;
	const time = picoAudio.context.currentTime - startTime;
	if (isDrawing){
	line(time);
	}
	requestAnimationFrame(loop);
}

		}else if(m%(ppq/ntvl*4)===0 && m>=time/60*bpm*ppq && m<=(time/60*bpm*ppq+ht1*ppq*bttl/ntvl*4)){
		ctx2.beginPath();
		ctx2.moveTo(mx,my+(m-time/60*bpm*ppq)*(szy-my)/(ht1*bttl*ppq/ntvl*4));
		ctx2.lineTo(mx+szk,my+(m-time/60*bpm*ppq)*(szy-my)/(ht1*bttl*ppq/ntvl*4));
		ctx2.strokeStyle="blue";
		ctx2.stroke();
		}
	}

	for(i=0;i<r1.length;i++){
		let [midi, start, stop, channel, n_id]=r1[i];
		const dt = (start-time/60*bpm*ppq)/(bttl*ppq/ntvl*4);
		const dp = (stop-time/60*bpm*ppq)/(bttl*ppq/ntvl*4);
		gt=(stop-start)/(bttl*ppq/ntvl*4);
		if (dp > -1/4 && dt < ht1){
			const x0 = (midi-midi_min)*kw+mx;
			const x1 = (midi-midi_min+0.5)*kw+mx;
			const y = my+dt*(szy-my)/ht1;
			ctx2.fillStyle=col[midi%12];
			ctx2.fillRect(x0,y,kw,gt*(szy-my)/ht1);
			ctx2.beginPath();
			ctx2.arc(x1,y,kw/2,0,2*Math.PI,false);
			ctx2.fillStyle=col3[channel];
			ctx2.fill();
		}
	}
};

function instrument1(){
canvas2.height = 1300;
ctx2.font="25px Arial";
ctx2.fillStyle="black";
ctx2.clearRect(0,0,1200,1300);
ctx2.fillText("Color",100,50);
ctx2.fillText("Channel",200,50);
ctx2.fillText("Instrument",350,50);

for(let i=0;i<=ch_max;i++){
let [channel,instNumber]=r6[i];
let instrument=instName[instNumber];
ctx2.fillStyle=col3[channel];
ctx2.beginPath();
ctx2.arc(110,30*(i+1)+40,10,0,2*Math.PI,false);
ctx2.fill();
ctx2.fillStyle="black";
if(channel===10){
ctx2.fillText(Number(channel)+1,200,30*(i+1)+50);
ctx2.fillText("Percussion",350,30*(i+1)+50);
}else{
ctx2.fillText(Number(channel)+1,200,30*(i+1)+50);
ctx2.fillText(instrument,350,30*(i+1)+50);
}
}
}
