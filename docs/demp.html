            await fetch(

                file1name +
                ".mid"
            );

        return await res.arrayBuffer();
    }
}

async function fetchData(){

    // ローカルファイル優先
    if(localMidiFile){

        let data1 =
            await localMidiFile.arrayBuffer();

        return {
            data1: data1,
            data2: null
        };
    }

    let file1name =
        document.getElementById("song1")
        .value;

    let uri1 =
        "./data/" +
        file1name +
        ".mid";

    let uri2 =
        "./data/" +
        file1name +
        ".tsv";

    let res1 =
        await fetch(uri1);

    let res2 =
        await fetch(uri2);

    let data1 = null;
    let data2 = null;

    if(res1.ok){
        data1 =
            await res1.arrayBuffer();
    }

    if(res2.ok){
        data2 =
            await res2.text();
    }

    return {
        data1,
        data2
    };
}

function setMidi0(data1){
	picoAudio.init();

	const midiData = new Uint8Array(data1);
	const parsed = picoAudio.parseSMF(midiData);

	state.midi.parsed = parsed;
	state.midi.songLength = parsed.songLength;
	state.midi.ppq = parsed.header.resolution;
	state.midi.bpm = parsed.tempoTrack[0].value;
	state.midi.bttl = parsed.beatTrack[0].value[0];
	state.midi.ntvl = parsed.beatTrack[0].value[1];

	state.notes.r1 = [];
	state.notes.r2 = [];
	state.notes.r3 = [];

	let max = 0;
	let min = 128;

	parsed.channels.forEach(channel => {
		channel.notes.forEach(note => {

			state.notes.r1.push([
				note.pitch,
				note.start,
				note.stop,
				note.channel,
				note.velocity
			]);

			state.notes.r2.push(note.start);
			state.notes.r2.push(note.stop);

			if(note.pitch > max) max = note.pitch;
			if(note.pitch < min) min = note.pitch;
		});
	});

	state.midi.maxPitch = max;
	state.midi.minPitch = min;
}

function setTsv(data2){

    tsv = {
        raw: "",
        a: [],
        sc: [],
        ff: [],
        ft: [],
        sd: [],
        dl: [],
        t1: [],
        t2: [],
        t3: [],
        t4: [],
        t5: [],
        t6: [],
        t7: [],
        t8: [],
        t9: []
    };

    tsv.raw = data2;

	const lines = data2.split('\n');

	lines.forEach(line => {
		const cols = line.split('\t');
		const type = cols[0];

		if(type === "A"){
			tsv.a.push([cols[1], cols[2]]);
		}else if(type === "B"){
			tsv.sc.push([cols[2]]);
		}else if(type === "C"){
			tsv.ff.push([cols[1], cols[2]]);
			tsv.ft.push([cols[2], cols[1]]);
			tsv.sd.push([cols[3], - cols[3]]);
			tsv.dl.push([cols[4], cols[4]]);
		}else if(type === "D"){
			tsv.t1.push([cols[2]]);
			tsv.t2.push([cols[3]]);
			tsv.t3.push([cols[4]]);
			tsv.t4.push([cols[5]]);
			tsv.t5.push([cols[6]]);
			tsv.t6.push([cols[7]]);
			tsv.t7.push([cols[8]]);
			tsv.t8.push([cols[9]]);
			tsv.t9.push([cols[10]]);
		}
	});
}

function assignHands(
    recordData,
    scoreRight,
    scoreLeft
){
    const right = [];
    const left = [];

    for(const r of recordData){

        let rightCost = Infinity;
        let leftCost = Infinity;

        for(const s of scoreRight){
			const rLen = r.stop - r.start;
			const sLen = s.stop - s.start;
			const cost =
				Math.abs(r.midi - s.midi)
				+
				Math.abs(r.start - s.start) / 100
				+
				Math.abs(rLen - sLen) / 100;

            rightCost =
                Math.min(
                    rightCost,
                    cost
                );
        }

        for(const s of scoreLeft){
			const rLen = r.stop - r.start;
			const sLen = s.stop - s.start;
			const cost =
				Math.abs(r.midi - s.midi)
				+
				Math.abs(r.start - s.start) / 100
				+
				Math.abs(rLen - sLen) / 100;

            leftCost =
                Math.min(
                    leftCost,
                    cost
                );
        }

	if(rightCost <= leftCost){

		console.log(
			"R",
			r.midi,
			rightCost,
			leftCost
		);

		right.push(r);

	}else{

		console.log(
			"L",
			r.midi,
			rightCost,
			leftCost
		);

		left.push(r);
	}    }

    return {
        right,
        left
    };
}

function playSound(e){

    if(!canInput()) return;

    let szx =
        canvas.width;

        Number(midi_max)
        -
        Number(midi_min)
        + 1;

        )

    ){

        }

        const x_bpm =

                document.form1.x_bpm.value
            );

        const audioNow =
            playPicoNow(p);

		const latency =
			0.04;
			
		const t =
			(
				audioNow
				-
				baseAudioTime
				+
				latency
			)
			*
			x_bpm
			*
			ppq
			/ 60;

        recordData.push({
		    channel: 0,
            midi: p,
            start: t,
            stop: null,
			velocity: 100
        });

        currentMidis.add(p);
    }
}

let activeVoices = new Map();

function playPicoNow(midi){

    const ctx =
        picoAudio.context;

    const osc =
        ctx.createOscillator();

    const gain =
        ctx.createGain();

    osc.frequency.value =
        midiToFreq(midi);

    osc.type = "triangle";

    osc.connect(gain);

    gain.connect(ctx.destination);

    const now =
        ctx.currentTime;

    gain.gain.setValueAtTime(
        0.0001,
        now
    );

    gain.gain.exponentialRampToValueAtTime(
        0.2,
        now + 0.01
    );

    osc.start(now);

    activeVoices.set(midi, {
        osc,
        gain
    });

    return now;
}


function stopPicoNow(midi){

    const voice =
        activeVoices.get(midi);

    if(!voice){
        return;
    }

    const now =
        picoAudio.context.currentTime;

    voice.gain.gain.cancelScheduledValues(now);

	voice.gain.gain.setValueAtTime(
		0.2,
		now
	);

    voice.gain.gain.exponentialRampToValueAtTime(
        0.0001,
        now + 0.05
    );

    voice.osc.stop(now + 0.05);

    voice.osc.onended = () => {

        voice.osc.disconnect();

        voice.gain.disconnect();
    };

    activeVoices.delete(midi);
}

function offSound(){

    currentMidis.forEach(midi => {
		
		stopPicoNow(midi);
        
		const t = getCurrentTick();

        const x_bpm =
            parseFloat(
                document.form1.x_bpm.value
            );

        const minDurSeconds = 0.05;

        const minDur =
            minDurSeconds *
            x_bpm *
            ppq / 60;

        for(
            let i = recordData.length - 1;
            i >= 0;
            i--
        ){

            const ev = recordData[i];

            if(
                ev.midi === midi &&
                ev.stop === null
            ){

                ev.stop = Math.max(
                    t,
                    ev.start + minDur
                );

                break;
            }
        }
    });

    currentMidis.clear();
}

function lineScore(tick){
	ctx.clearRect(0,0,canvas.width,canvas.height);
	szx = canvas.width;
	szy = canvas.height-my;
	szk = szx-2*mx;
	ctx.lineWidth=1;


	if (document.form1.hands.options[0].selected==true) {
		midi_max=midi_max_b;
		midi_min=midi_min_b;
	} else if (document.form1.hands.options[1].selected==true){
		midi_max=midi_max_r;
		midi_min=midi_min_r;
	}else if (document.form1.hands.options[2].selected==true) {
		midi_max=midi_max_l;
		midi_min=midi_min_l;
	}


	let kn=Number(midi_max)-Number(midi_min)+1;
	let kw=szk/kn;
	for(l=0;l<Number(kn);l++){
		let k=Number(midi_min)+l;
		ctx.fillStyle=col2[Math.floor(k/12)-1];
		ctx.fillRect(mx+l*kw,0,kw,my/2);
		ctx.fillStyle=col[k%12];
		ctx.fillRect(mx+l*kw,my/2,kw,my/2);
		if (k%12===1 || k%12===3 || k%12===6 || k%12===8 || k%12===10){
		ctx.fillStyle="lightgrey";
		ctx.fillRect(mx+l*kw,my,kw,szy-my);
		}else if (k%12===0){
		ctx.beginPath();
		ctx.moveTo(mx+l*kw,my);
		ctx.lineTo(mx+l*kw,szy);
		ctx.strokeStyle="red";
		ctx.stroke();
		}else if (k%12===5){
		ctx.beginPath();
		ctx.moveTo(mx+l*kw,my);
		ctx.lineTo(mx+l*kw,szy);
		ctx.strokeStyle="green";
		ctx.stroke();
		}
	}

	if (tick<eott0){
	ctx.beginPath();
	ctx.moveTo(0,my+tick%(ht1*bttl*ppq/ntvl*4)*(szy-my)/(ht1*bttl*ppq/ntvl*4));
	ctx.lineTo(szx,my+tick%(ht1*bttl*ppq/ntvl*4)*(szy-my)/(ht1*bttl*ppq/ntvl*4));
	ctx.strokeStyle="grey";
	ctx.stroke();
	} else {
		isPlaying = 0;
	}

	ctx.beginPath();
	ctx.moveTo(0,szy);
	ctx.lineTo(mx+szk,szy);
	ctx.strokeStyle="red";
	ctx.stroke();

	for(let m=0;m<eott0;m=m+ppq/ntvl*4){
		if(m%(ppq*bttl/ntvl*4)===0 && m>=tick && m<(tick+ht1*ppq*bttl/ntvl*4)){
		let vmn0=m/ppq/bttl*ntvl/4+1;
		ctx.beginPath();
		ctx.moveTo(0,my+m%(ht1*bttl*ppq/ntvl*4)*(szy-my)/(ht1*bttl*ppq/ntvl*4));
		ctx.lineTo(mx+szk,my+m%(ht1*bttl*ppq/ntvl*4)*(szy-my)/(ht1*bttl*ppq/ntvl*4));
		ctx.strokeStyle="red";
		ctx.stroke();
		ctx.fillStyle="black";
		ctx.font="25px Arial";
		ctx.fillText(vmn0,0,my+25+m%(ht1*bttl*ppq/ntvl*4)*(szy-my)/(ht1*bttl*ppq/ntvl*4));
		}else if(m%(ppq/ntvl*4)===0 && m>=tick && m<(tick+ht1*ppq*bttl/ntvl*4)){
		ctx.beginPath();
		ctx.moveTo(mx,my+m%(ht1*bttl*ppq/ntvl*4)*(szy-my)/(ht1*bttl*ppq/ntvl*4));
		ctx.lineTo(mx+szk,my+m%(ht1*bttl*ppq/ntvl*4)*(szy-my)/(ht1*bttl*ppq/ntvl*4));
		ctx.strokeStyle="blue";
		ctx.stroke();
		}
	}

	for(let i=0;i<r1.length;i++){
		let midi = r1[i].midi;
		let start = r1[i].start;
		let stop = r1[i].stop;
		let channel = r1[i].channel;
		let n_id = r1[i].n_id;
		const dt = (start-tick)/(bttl*ppq/ntvl*4);
		const dp = (stop-tick)/(bttl*ppq/ntvl*4);
		if (stop>=tick+ht1*bttl*ppq/ntvl*3){
			gt=tick+ht1*bttl*ppq/ntvl*3-start;
		}else{
			gt=stop-start;
		}
		if (dp >=0 && dt < ht1*3/4){
			const x0 = (midi-midi_min)*kw+mx;
			const x1 = (midi-midi_min+0.5)*kw+mx;
			const y = my+start%(ht1*bttl*ppq/ntvl*4)*(szy-my)/(ht1*bttl*ppq/ntvl*4);
			if((document.form1.hands.options[0].selected==true ) || 
			(document.form1.hands.options[1].selected==true && channel==x_chR) || 
			(document.form1.hands.options[2].selected==true && channel==x_chL)){
				ctx.fillStyle=col[midi%12];
				ctx.fillRect(x0,y,kw,gt/(bttl*ppq/ntvl*4)*(szy-2*my)/ht1);
				ctx.beginPath();
				ctx.arc(x1,y,kw/2,0,2*Math.PI,false);
				ctx.fillStyle=col3[channel];
				ctx.fill();
				getLabel(midi, n_id);
				ctx.fillStyle="black";
				ctx.font="20px Arial";
				if (nl!=""){
				ctx.fillText(nl, x0+3, y+7);
				}
				if (nll!=""){
				ctx.fillText(nll, mx, y);
				}
				if (nlr!=""){
				ctx.fillText(nlr, mx+szk, y);
				}
			}
		}
	}
};

let prevTick = 0;
let nextIndex = 0;

function playRecordNotes(tick){

	if(tick < prevTick){
        nextIndex = 0;
    }

    const x_bpm = parseFloat(document.form1.x_bpm.value);

    const currentTick = Math.floor(tick);
    const previousTick = Math.floor(prevTick);

    const lookAheadTicks =
        0.1 * x_bpm * ppq / 60;

    while(nextIndex < recordData.length){

        let data = recordData[nextIndex];

        let midi  = data.midi;
        let start = data.start;
        let stop  = data.stop;

        if(start > currentTick + lookAheadTicks){
            break;
        }
		if(
			stop != null &&
			start >= previousTick &&
			start <= currentTick + lookAheadTicks
		){
            let durationTicks =
                Math.max(1, stop - start);

            let durationSeconds =
                durationTicks / ppq * 60 / x_bpm;

            playPico(midi, durationSeconds, start);
        }

        nextIndex++;
    }

    prevTick = tick;
}

function playPico(
    midi,
    duration,
    start
){

    const ctx2 = picoAudio.context;

    const osc =
        ctx2.createOscillator();

    const gain =
        ctx2.createGain();

    osc.frequency.value =
        midiToFreq(midi);

    osc.type = "triangle";

    osc.connect(gain);

    gain.connect(ctx2.destination);

    const x_bpm =
        parseFloat(
            document.form1.x_bpm.value
        );

    const when =
        baseAudioTime +
        start / ppq * 60 / x_bpm;

	const sustainEnd =
		Math.max(
			when + 0.01,
			when + duration - 0.02
		);

	gain.gain.setValueAtTime(
		0.0001,
		when
	);

	gain.gain.exponentialRampToValueAtTime(
		0.2,
		when + 0.01
	);

	gain.gain.setValueAtTime(
		0.2,
		sustainEnd
	);

	gain.gain.exponentialRampToValueAtTime(
		0.0001,
		when + duration
	);

    osc.start(when);

    osc.stop(when + duration);

    osc.onended = () => {

        osc.disconnect();
        gain.disconnect();
    };
}

function midiToFreq(midi){

    return 440 * Math.pow(
        2,
        (midi - 69) / 12
    );
}

function matchNotes(scoreData, recordData){

    const m = scoreData.length;
    const n = recordData.length;

    const dp = [];
	const MISS_COST = 50;

    for(let i=0; i<=m; i++){

        dp[i] = [];

        for(let j=0; j<=n; j++){

            dp[i][j] = Infinity;
        }
    }

    dp[0][0] = 0;

    for(let i=0; i<=m; i++){

        for(let j=0; j<=n; j++){

            if(i < m && j < n){

                const s = scoreData[i];
                const r = recordData[j];

                const pitchCost =
                    Math.abs(s.midi - r.midi);

                const timeCost =
                    Math.abs(s.start - r.start) / 100;

				const durationCost =
					Math.abs(
						(s.stop - s.start)
						-
						(r.stop - r.start)
					) / 100;

				const matchCost =
					pitchCost * 10 +
					timeCost +
					durationCost;

                dp[i+1][j+1] =
                    Math.min(
                        dp[i+1][j+1],
                        dp[i][j] + matchCost
                    );
            }

            // 楽譜側欠落
            if(i < m){

                dp[i+1][j] =
                    Math.min(
                        dp[i+1][j],
                        dp[i][j] + MISS_COST
                    );
            }

            // 余計な音
            if(j < n){

                dp[i][j+1] =
                    Math.min(
                        dp[i][j+1],
                        dp[i][j] + MISS_COST
                    );
            }
        }
    }

    const pairs = [];

    let i = m;
    let j = n;

    while(i > 0 || j > 0){

        if(
            i > 0 &&
            j > 0
        ){

            const s = scoreData[i-1];
            const r = recordData[j-1];

            const pitchCost =
                Math.abs(s.midi - r.midi);

            const timeCost =
                Math.abs(s.start - r.start) / 100;

			const durationCost =
				Math.abs(
					(s.stop - s.start)
					-
					(r.stop - r.start)
				) / 100;

			const matchCost =
				pitchCost * 10 +
				timeCost +
				durationCost;

            if(
                Math.abs(
                    dp[i][j] -
                    (dp[i-1][j-1] + matchCost)
                ) < 0.0001
            ){

                pairs.unshift({

                    scoreIndex: i-1,
                    recordIndex: j-1,

                    score: s,
                    record: r

                });

                i--;
                j--;

                continue;
            }
        }

        if(
            i > 0 &&
            Math.abs(
                dp[i][j] -
                (dp[i-1][j] + MISS_COST)
            ) < 0.0001
        ){

            pairs.unshift({

                scoreIndex: i-1,
                recordIndex: null,

                score: scoreData[i-1],
                record: null

            });

            i--;

            continue;
        }

        if(j > 0){

            pairs.unshift({

                scoreIndex: null,
                recordIndex: j-1,

                score: null,
                record: recordData[j-1]

            });

            j--;
        }
    }

    return pairs;

	const matched =
		pairs.filter(
			p => p.score && p.record
		);

	console.log(
		"matched",
		matched.length
	);

}

let diffData = [];

function createDiffData(pairs){

    const diffData = [];

	for(const pair of pairs){

		// 弾き忘れ
		if(
			pair.score != null &&
			pair.record == null
		){

			diffData.push({

				missed: true,

				tick:
					pair.score.start,

				measure:
					Math.floor(
						pair.score.start /
						ticksPerMeasure
					) + 1
			});

			continue;
		}

		// 余計な音
		if(
			pair.score == null &&
			pair.record != null
		){

			diffData.push({

				extra: true,

				tick:
					pair.record.start,

				measure:
					Math.floor(
						pair.record.start /
						ticksPerMeasure
					) + 1
			});

			continue;
		}

		const s = pair.score;
		const r = pair.record;

		diffData.push({

			tick: s.start,

			pitchDiff:
				r.midi - s.midi,

			attackDiff:
				r.start - s.start,

			releaseDiff:
				r.stop - s.stop,

			durationDiff:
				(r.stop-r.start)
				-
				(s.stop-s.start),

			velocityDiff:
				r.velocity -
				s.velocity * 127,

			measure:
				Math.floor(
					s.start /
					ticksPerMeasure
				) + 1
		});
	}

	diffData.sort(
		(a,b) => a.tick - b.tick
	);

    return diffData;

}

function calcPitchAccuracy(diffData){

    let correct = 0;
    let count = 0;

    for(const d of diffData){

        if(d.missed || d.extra){
            continue;
        }

        count++;

        if(d.pitchDiff === 0){
            correct++;
        }
    }

    if(count === 0){
        return 0;
    }

    return correct / count * 100;
}

function calcAttackAccuracy(diffData){

    let total = 0;
	let count = 0;

	for(const d of diffData){

        if(d.missed || d.extra){
            continue;
        }

        count++;

		const err =
            Math.abs(d.attackDiff);

        let score;

        if(err <= ppq * 0.05){

            score = 100;

        }else if(err <= ppq * 0.10){

            score = 90;

        }else if(err <= ppq * 0.20){

            score = 70;

        }else if(err <= ppq * 0.30){

            score = 40;

        }else{

            score = 0;
        }

        total += score;
    }

    return count ? total / count : 0;
}

    let total = 0;
	let count = 0;

	for(const d of diffData){

        if(d.missed || d.extra){

}

function calcDurationAccuracy(diffData){

	for(const d of diffData){

        count++;

            );

        }else if(err <= ppq * 0.20){

            score = 90;

        }else if(err <= ppq * 0.40){

            score = 70;

        }else if(err <= ppq * 0.60){

            score = 40;

        }else{

            score = 0;
        }

        total += score;
    }

    return count ? total / count : 0;
}

function calcVelocityAccuracy(diffData){

    let total = 0;
	let count = 0;

	for(const d of diffData){

        if(d.missed || d.extra){
            continue;
        }

        count++;

        const err =
            Math.abs(d.velocityDiff);

        let score;

        if(err <= 5){

            score = 100;

        }else if(err <= 10){

            score = 90;

        }else if(err <= 20){

            score = 70;

        }else if(err <= 40){

            score = 40;

        }else{

            score = 0;
        }

        total += score;
    }

    return count ? total / count : 0;
}

function drawGraph(

){

    ctx.fillText(
        title,
        50,
        offsetY + 20
    );

    // 中央線
    ctx.strokeStyle = "#888";

    ctx.beginPath();

    ctx.moveTo(
        mx,
        centerY
    );

    ctx.lineTo(
        mx + w,
        centerY
    );

    ctx.stroke();

	const maxTick =
		Math.max(
			...scoreData.map(n => n.start)
		);
		
	// --------------------
    // 小節線だけ描画
    // --------------------

		ctx.strokeStyle = "#ddd";

		ctx.fillStyle = "black";
	
		const drawnMeasures =
		new Set();

	for(let i = 0; i < diffData.length; i++){

		const measure =
			diffData[i].measure;

		if(
			drawnMeasures.has(
				measure
			)
		){
			continue;
		}

		drawnMeasures.add(
			measure
		);

		const x =
			mx +
			diffData[i].tick /
			maxTick *
			w;

		if(showMeasureLabel){

			ctx.fillText(
				measure,
				x,
				offsetY + graphHeight
			);
		}

		ctx.beginPath();

		ctx.moveTo(
			x,
			offsetY + titleHeight
		);

		ctx.lineTo(
			x,
			offsetY +
			(graphHeight - titleHeight)
		);

		ctx.stroke();
	}
    // --------------------
    // 折れ線描画
    // --------------------

    ctx.strokeStyle = color;

    ctx.fillStyle = color;

    ctx.lineWidth = 2;

    ctx.beginPath();

for(let i = 0; i < diffData.length; i++){

    const x =
        mx +
        diffData[i].tick
        / maxTick
        * w;

    const y =
        centerY
        -
        diffData[i][key] * scaleY;

        // 点
        ctx.fillRect(
            x - 2,
            y - 2,
            4,
            4
        );

        // 折れ線
        if(i === 0){

            ctx.moveTo(x, y);

        }else{

            ctx.lineTo(x, y);
        }
    }

    ctx.stroke();
}

function drawPedalGraph(
    pedalData,
    title,
    offsetY,
	color,
    showMeasureLabel

){

	if(pedalData.length === 0){
    return;
	}
	
	const pedalGraphData = [];

	for(const p of pedalData){

		pedalGraphData.push({

			cc: p.cc,

			measure:
				Math.floor(
					p.start / ticksPerMeasure
				) + 1,

			tick: p.start,

			pedalValue: p.value
		});
	}

    const graphHeight = 100;

	const titleHeight = 30;

    const w = canvas.width - 2 * mx;

	const topY = offsetY + 40;

	const bottomY = offsetY + 80;

	const maxTick =
		Math.max(
			...scoreData.map(n => n.start)
		);		

	// タイトル

	ctx.fillStyle = "black";

    ctx.font = "20px sans-serif";

    ctx.fillText(
        title,
        50,
        offsetY + 20
    );
		
	// --------------------
    // 小節線だけ描画
    // --------------------
	ctx.strokeStyle = "#ddd";

	ctx.fillStyle = "black";

	const totalMeasures =
		Math.ceil(
			maxTick / ticksPerMeasure
		);

	for(
		let m = 1;
		m <= totalMeasures;
		m++
	){

		const tick =
			(m - 1) * ticksPerMeasure;

		const x =
			mx +
			tick / maxTick * w;

		if(showMeasureLabel){

			ctx.fillText(
				m,
				x,
				offsetY + graphHeight
			);
		}

		ctx.beginPath();

		ctx.moveTo(
			x,
			offsetY + titleHeight
		);

		ctx.lineTo(
			x,
			offsetY + (graphHeight - titleHeight)
		);

		ctx.stroke();
	}

    // --------------------
    // 折れ線描画
    // --------------------

    ctx.strokeStyle = color;

    ctx.fillStyle = color;

    ctx.lineWidth = 2;

	
	let prevY = null;

	ctx.beginPath();

	for(let i = 0; i < pedalGraphData.length; i++){

		const x =
			mx +
			pedalGraphData[i].tick / maxTick * w;

		const y =
			bottomY
			-
			pedalGraphData[i].pedalValue / 127
			*
			(bottomY - topY);

		if(i === 0){

			ctx.moveTo(x, y);

		}else{

			ctx.lineTo(x, prevY);
			ctx.lineTo(x, y);
		}

		prevY = y;
	}

	const lastX =
		mx + w;

	ctx.lineTo(
		lastX,
		prevY
	);

	ctx.stroke();
}

const oscillators = {};

function onMIDISuccess(midiAccess){

    for(let input of midiAccess.inputs.values()){

        input.onmidimessage =
            onMIDIMessage;
    }
}

function onMIDIMessage(event){

    if(!canInput()) return;

    inputRouter(event, "midi");

    const [status, data1, data2] = event.data;

    const command = status & 0xf0;
	const channel = status & 0x0f;
	const audioNow =
		picoAudio.context.currentTime;
    const x_bpm =
        parseFloat(
            document.form1.x_bpm.value
        );

	const latency = 0.04;

	const t =
	(
		audioNow
		- baseAudioTime
		+ latency
	)
	* x_bpm
	* ppq
	/ 60;

    // ペダル
    if(command === 0xb0){
		const cc = data1;
        const value = data2;

		console.log(
				"CC",
				data1,
				"value",
				data2
			);

		if(
			cc === 64 ||
			cc === 66 ||
			cc === 67
		){
			if(isRecording){

				pedalData.push({
					channel,
					cc,
					value,
					start: t
				});
			}
		}

		console.log(pedalData);
	}

	// Note On
	if(command === 0x90 && data2 > 0){

		const note = data1;
		const velocity = data2;

		// 音は常に鳴らす
		noteOn(note, velocity);

		// 録音中だけ記録する
		if(isRecording){

			const noteData = {
				channel,
				midi: note,
				start: t,
				stop: null,
				velocity
			};

			recordData.push(noteData);

			const key =
				channel + "_" + note;

			activeNotes[key] = noteData;
		}
	}
	// Note Off
	if(
		command === 0x80 ||
		(
			command === 0x90 &&
			data2 === 0
		)
	){

		const note = data1;

		noteOff(note);

		if(isRecording){

			const key =
				channel + "_" + note;

			if(activeNotes[key]){

				activeNotes[key].stop = t;

				delete activeNotes[key];
			}
		}
	}
}

function noteToFreq(note){

    return 440 *
        Math.pow(
            2,
            (note - 69) / 12
        );
}

function noteOn(note, velocity){

	console.log(status, note, velocity);

    if(oscillators[note]){

        oscillators[note].stop();

        delete oscillators[note];
    }

    const osc =
        audioContext.createOscillator();

    const gain =
        audioContext.createGain();

    osc.type = "sine";

    osc.frequency.value =
        noteToFreq(note);

    gain.gain.value =
        velocity / 127 * 0.2;

    osc.connect(gain);
    gain.connect(audioContext.destination);

    osc.start();

    oscillators[note] = osc;
}


function noteOff(note){

    const osc = oscillators[note];

    if(!osc) return;

    osc.stop();

    delete oscillators[note];
}

function createMidiEvents(){

    const events = [];

    // ノート
    for(const n of recordData){

        events.push({
            tick: Math.round(n.start),
            type: "on",
            channel: n.channel,
            note: n.midi,
            velocity: n.velocity
        });

        if(n.stop != null){

            events.push({
                tick: Math.round(n.stop),
                type: "off",
                channel: n.channel,
                note: n.midi,
                velocity: 0
            });
        }
    }

    // ペダル
    for(const p of pedalData){

        events.push({
            tick: Math.round(p.start),
            type: "cc",
            channel: p.channel,
            cc: p.cc,
            value: p.value
        });
    }

    events.sort(
        (a,b) => a.tick - b.tick
    );

    return events;
}

function writeVLQ(value){

    let buffer = value & 0x7F;
    const bytes = [];

    while((value >>= 7)){

        buffer <<= 8;
        buffer |=
            ((value & 0x7F) | 0x80);
    }

    while(true){

        bytes.push(buffer & 0xFF);

        if(buffer & 0x80){

            buffer >>= 8;

        }else{

            break;
        }
    }

    return bytes;
}


function createTrackData(){

    const track = [];

    // Tempo
    const mpqn =
        Math.round(
            60000000 / bpm
        );

    track.push(
        0x00,
        0xFF,
        0x51,
        0x03,
        (mpqn >> 16) & 255,
        (mpqn >> 8) & 255,
        mpqn & 255
    );

    // Time Signature
    track.push(
        0x00,
        0xFF,
        0x58,
        0x04,
        bttl,
        Math.round(
            Math.log2(ntvl)
        ),
        24,
        8
    );

	//Program Change (C0)
	track.push(
		0x00,
		0xC0,
		0x00
	);

    let prevTick = 0;

    const events =
        createMidiEvents();

    for(const e of events){

        const delta =
            e.tick - prevTick;

        prevTick = e.tick;

        track.push(
            ...writeVLQ(delta)
        );

        if(e.type === "on"){

            track.push(
                0x90 | e.channel,
                e.note,
                e.velocity
            );
        }

        if(e.type === "off"){

            track.push(
                0x80 | e.channel,
                e.note,
                0
            );
        }

        if(e.type === "cc"){

            track.push(
                0xB0 | e.channel,
                e.cc,
                e.value
            );
        }
    }

    // End Of Track
    track.push(
        0x00,
        0xFF,
        0x2F,
        0x00
    );

    return track;
}

function saveMidi(){

	console.log(recordData[0].channel);

    const trackData =
        createTrackData();

    const bytes = [];

    // MThd
    bytes.push(
        0x4d,0x54,0x68,0x64,
        0x00,0x00,0x00,0x06,
        0x00,0x00,
        0x00,0x01,
        (ppq>>8)&255,
        ppq&255
    );

    // MTrk
    const len =
        trackData.length;

    bytes.push(
        0x4d,0x54,0x72,0x6b,
        (len>>24)&255,
        (len>>16)&255,
        (len>>8)&255,
        len&255
    );

    bytes.push(...trackData);

    const blob =
        new Blob(
            [new Uint8Array(bytes)],
            {type:"audio/midi"}
        );

    const url =
        URL.createObjectURL(blob);

    const a =
        document.createElement("a");

    a.href = url;
    a.download = "record.mid";
    a.click();
}

			ctx.fillText("Percussion",600,30*(i+1)+50);
		}else{
			ctx.fillText(Number(channel)+1,200,30*(i+1)+50);
			ctx.fillText(instrument,600,30*(i+1)+50);
		}

		ctx.fillText(
			channelAvg[channel] !== undefined
				? channelAvg[channel].toFixed(1)
				: "-",
			350,
			30*(i+1)+50
		);
	}
}

function selview1(){

	if(document.form1.sv1.options[0].selected==true){
		if(recordData && recordData.length > 0){
			lineRecord(pauseTick);
			showCanvas();
		}else{
			lineScore(pauseTick);
			showCanvas();
		}
	}else if(document.form1.sv1.options[1].selected==true){
		if(recordData && recordData.length > 0){
			scrollRecord(pauseTick);
			showCanvas();
		}else{
			scrollScore(pauseTick);
			showCanvas();
		}
	}else if(document.form1.sv1.options[2].selected==true){
		keyLabel();
		showCanvas();
	}else if(document.form1.sv1.options[3].selected==true){
		channelInfo();
		showCanvas();
	}else if(document.form1.sv1.options[4].selected==true){
		licenseInfo();
	}

}

function showCanvas(){

    document.getElementById("license").style.display =
        "none";

    document.getElementById("canvas").style.display =
        "block";
}

</script>
