<script>
//
// playscore tree
//

//playScore
//loopPlayback
//scheduleNotes
//renderPlayback

/*
Constants
    ├─ Color Settings
    ├─ MIDI Constants
    └─ UI Constants

Global Variables
    ├─ Color Settings
    ├─ MIDI
    ├─ Recording
    ├─ Analysis
    └─ Practice
*/

//========================================
// naming rule for function
//========================================
//
// read...Ui(): from Ui to data
// on...Change(): action on event onchange 
// update...Ui(): from data to Ui
// save...(): from data to localStorage
// loadSaved..(): from localStorage to data
// reset...(): from default to data
//

//========================================
// UI Value
//========================================

function $(id) {
    return document.getElementById(id);
}

function val(id) {
    return $(id).value;
}

function num(id) {
    return Number($(id).value);
}

function chk(id) {
    return $(id).checked;
}

function setVal(id, value) {
    $(id).value = value;
}

//========================================
// UI Array Value
//========================================


function readArrayUi(array, prefix) {

    for (let i = 0; i < array.length; i++) {
        array[i] = val(prefix + i);
    }
}

function writeArrayUi(array, prefix) {

    for (let i = 0; i < array.length; i++) {
        setVal(prefix + i, array[i]);
    }
}


function readObjUi(obj, prefix) {

    for (const key in obj) {
        obj[key] = val(prefix + key);
    }

}

function writeObjUi(obj, prefix) {

    for (const key in obj) {
        setVal(prefix + key, obj[key]);
    }

}

//========================================
// Color Settings
//========================================

const defaultColor={
	oct:["#ffffff","#ff0000","#ff9900","#ffff00","#00ff00","#00ffff","#0000ff","#ff00ff","#ff0099"],
	pc:["#ff0000","#ff9900","#ffff00","#ccff00","#00ff00","#00ffcc","#00ffff","#0099ff","#0000ff","#9900ff","#ff00ff","#ff0099"],
	hand:["#ffcc00","#ffccff","#9966ff","#cc99ff","#ccffff"],
	line:["#cccccc","#ff0000","#00ff99","#cc00cc","#0000cc","#999999"],
	text:["#666600","#990000","#009900","#009999","#ff0000"]
}

let workingColor = structuredClone(defaultColor);

const HAND_COLOR = {
    SCORE_RIGHT: 0,
    SCORE_LEFT: 1,
    RECORD_BOTH_CIRCLE: 2,
    RECORD_BOTH_BAR: 3,
    SCORE_NOT_ASSIGNED: 4
};

function readColorUi(){

	readArrayUi(workingColor.oct, "x_oct_");
	readArrayUi(workingColor.pc, "x_pc_");
	readArrayUi(workingColor.hand, "x_hand_");
	readArrayUi(workingColor.line, "x_line_");
	readArrayUi(workingColor.text, "x_text_");	

}

function onColorChange(){

    readColorUi();
    saveColor();
    showSelectedView();

}

function updateColorUi(){

    writeArrayUi(workingColor.oct,  "x_oct_");
    writeArrayUi(workingColor.pc,   "x_pc_");
    writeArrayUi(workingColor.hand, "x_hand_");
	writeArrayUi(workingColor.line, "x_line_");
    writeArrayUi(workingColor.text, "x_text_");

}

function saveColor() {
    localStorage.setItem(
        "workingColor",
        JSON.stringify(workingColor)
    );
}

function loadSavedColor(){

    const tmp = localStorage.getItem("workingColor");

    if(tmp){
        workingColor = JSON.parse(tmp);
    }else{
        workingColor = structuredClone(defaultColor);
    }
}

function resetColor(){

    workingColor = structuredClone(defaultColor);

    localStorage.removeItem("workingColor");

    updateColorUi();

    showSelectedView();
}


//========================================
// Finger Settings
//========================================

const defaultFinger = {
    defaultDistance: {
        "1_2": 2,
        "1_3": 4,
        "1_4": 5,
        "1_5": 7,
    },
    lowerLimit: {
        "1_2": -3,
        "1_3": -2,
        "1_4": -1,
        "1_5": 0,
        "2_3": 0,
        "2_4": 0,
        "2_5": 0,
        "3_4": 0,
        "3_5": 0,
        "4_5": 0,
    },
    upperLimit: {
        "1_2": 9,
        "1_3": 10,
        "1_4": 11,
        "1_5": 12,
        "2_3": 5,
        "2_4": 7,
        "2_5": 9,
        "3_4": 4,
        "3_5": 7,
        "4_5": 4,
    }
};

let workingFinger = structuredClone(defaultFinger);

function readFingerUi(){

	readObjUi(workingFinger.defaultDistance, "x_defaultDistance_");
	readObjUi(workingFinger.lowerLimit, "x_lowerLimit_");
	readObjUi(workingFinger.upperLimit, "x_upperLimit_");

}

function onFingerChange(){

    readFingerUi();
    onSaveFinger();
    showSelectedView();

}

function loadMidi(arrayBuffer){

    midiData = new Uint8Array(arrayBuffer);

    initializeScoreSystem();
}


const TRACK = Object.freeze({
    RECORD: 3
});

function initializeScoreSystem(){

	rawMidi =
		parseMidi(midiData);

	const scoreAll = createScoreDataFromTracks(rawMidi);

	const recordDataLocal = scoreAll.filter(n => n.track === TRACK.RECORD);
	const scoreMain  = scoreAll.filter(n => n.track !== TRACK.RECORD);

	recordData = recordDataLocal;
	scoreData  = scoreMain;

	const tempoTrackData = createTempoTrack(rawMidi);
	const beatTrackData  = createBeatTrack(rawMidi);

	songFirstBpm =getTempo(tempoTrackData);
	
	const ts = getTimeSignature(beatTrackData);

	beatsPerMeasure = ts.beats;
	timeSignatureDenominator = ts.denom;

	ticksPerQuarterNote = getTicksPerQuarterNote(rawMidi);

	songLengthTicks = getSongLength();

	ticksPerMeasure = calcTicksPerMeasure(
		ticksPerQuarterNote,
		beatsPerMeasure,
		timeSignatureDenominator
	);

	const hands = splitHands(scoreMain);

	scoreRight = hands.right;
	scoreLeft  = hands.left;
		
	const range = resolveMidiRange({
		main: scoreMain,
		right: scoreRight,
		left: scoreLeft
	});
	midi_min = range.min;
	midi_max = range.max;

}

function getTicksPerQuarterNote(midi) {
    return midi.header.ticksPerBeat;
}


function getTempo(tempoTrackData) {
    return tempoTrackData.length > 0
        ? tempoTrackData[0].value
        : 60;
}

function getTimeSignature(beatTrackData) {
    return beatTrackData.length > 0
        ? {
            beats: beatTrackData[0].value[0],
            denom: beatTrackData[0].value[1]
        }
        : { beats: 4, denom: 4 };
}

function splitHands(scoreMain) {
	return {
		right: scoreMain.filter(n =>
			n.track === practiceSettings.handsTrackChannel.right.track &&
			n.channel === practiceSettings.handsTrackChannel.right.channel
		),
		left: scoreMain.filter(n =>
			n.track === practiceSettings.handsTrackChannel.left.track &&
			n.channel === practiceSettings.handsTrackChannel.left.channel
		)
	};
}

function calcTicksPerMeasure(
    ticksPerQuarterNote,
    beatsPerMeasure,
    timeSignatureDenominator
) {
    return ticksPerQuarterNote *
           4 *
           beatsPerMeasure /
           timeSignatureDenominator;
}


function getMidiRange(notes) {
    let min = Infinity;
    let max = -Infinity;

    for (const n of notes) {
        if (n.midi < min) min = n.midi;
        if (n.midi > max) max = n.midi;
    }

    return { min: min === Infinity ? 0 : min, max: max === -Infinity ? 0 : max };
}

function resolveMidiRange(scoreMain, scoreRight, scoreLeft){
    switch (practiceSettings.hands) {
        case HANDS.BOTH:
            return getMidiRange(scoreData);
        case HANDS.RIGHT:
            return getMidiRange(scoreRight);
        case HANDS.LEFT:
            return getMidiRange(scoreLeft);
    }
}

// score data

function createScoreDataFromTracks(rawMidi){

    const scoreData = [];

	let n_id = 1;

    rawMidi.tracks.forEach(
        (track, trackNo) => {

            if(trackNo === 0){
                return;
            }

            let tick = 0;

            const activeNotes = {};

            track.forEach(event => {

                tick += event.deltaTime;

                if(
                    event.type === "noteOn"
                    &&
                    event.velocity > 0
                ){

                    const key =
                        event.channel +
                        "_" +
                        event.noteNumber;

                    activeNotes[key] = {

                        start: tick,
                        velocity:
                            event.velocity
                    };
                }

                if(
                    event.type === "noteOff"
                    ||
                    (
                        event.type === "noteOn"
                        &&
                        event.velocity === 0
                    )
                ){

                    const key =
                        event.channel +
                        "_" +
                        event.noteNumber;

                    const note =
                        activeNotes[key];

                    if(note){

                        scoreData.push({

                            midi:
                                event.noteNumber,

                            start:
                                note.start,

                            stop:
                                tick,

                            velocity:
                                note.velocity,

                            channel:
                                event.channel,

                            track:
                                trackNo,

							n_id: 
								n_id++

                        });

						delete activeNotes[key];
                    }
                }
            });
        }
		
    );

	scoreData.sort(
		(a,b)=>a.start-b.start
	);

    return scoreData;
}


function createTempoTrack(){

	const tempoTrack = [];

	let tick = 0;

	rawMidi.tracks[0].forEach(event=>{

		tick += event.deltaTime;

		if(event.type === "setTempo"){

			tempoTrack.push({

				timing: tick,

				value:
					Math.round(
						60000000
						/
						event.microsecondsPerBeat
					)
			});
		}
	});

	return tempoTrack;

}

function createBeatTrack(){

	const beatTrack = [];

	let tick = 0;

	rawMidi.tracks[0].forEach(event=>{

		tick += event.deltaTime;

		if(event.type === "timeSignature"){

			beatTrack.push({

				timing: tick,

				value:[
					event.numerator,
					event.denominator
				]
			});
		}
	});

	return beatTrack;

}

function getSongLength(){

    let maxTick = 0;

    rawMidi.tracks.forEach(track => {

        let tick = 0;

        track.forEach(event => {

            tick += event.deltaTime;
        });

        if(tick > maxTick){

            maxTick = tick;
        }
    });

    return maxTick;
}

function readFileAsArrayBuffer(file){

        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
    });
}

function readFileAsText(file){
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsText(file);
    });
}

            midiFile = f;

        if(f.name.endsWith(".tsv")){

    const data1 = midiFile

    return { data1, data2 };
}

function assignHands(
    recordData,
    scoreRight,
    scoreLeft
){
    const right = [];
    const left = [];

    for(const r of recordData){

        let rightCost = Infinity;
        let leftCost = Infinity;

        for(const s of scoreRight){
			const rLen = r.stop - r.start;
			const sLen = s.stop - s.start;
			const cost =
				Math.abs(r.midi - s.midi)
				+
				Math.abs(r.start - s.start) / 100
				+
				Math.abs(rLen - sLen) / 100;

            rightCost =
                Math.min(
                    rightCost,
                    cost
                );
        }

        for(const s of scoreLeft){
			const rLen = r.stop - r.start;
			const sLen = s.stop - s.start;
			const cost =
				Math.abs(r.midi - s.midi)
				+
				Math.abs(r.start - s.start) / 100
				+
				Math.abs(rLen - sLen) / 100;

            leftCost =
                Math.min(
                    leftCost,
                    cost
                );
        }

	if(rightCost <= leftCost){

		right.push(r);

	}else{

		left.push(r);
	}    }

    return {
        right,
        left
    };
}

function createVoice(midi) {

    const ctx = audioContext;

    const freq = midiToFreq(midi);

    const gain = ctx.createGain();
    gain.connect(ctx.destination);

    const osc1 = ctx.createOscillator();
    osc1.frequency.value = freq;

    const osc2 = ctx.createOscillator();
    osc2.frequency.value = freq;

    const osc3 = ctx.createOscillator();
    osc3.frequency.value = freq;

    const detune = 0.3 + (midi - 21) * 0.01;

    const pan1 = ctx.createStereoPanner();
    const pan2 = ctx.createStereoPanner();
    const pan3 = ctx.createStereoPanner();

    const keyboardPan = Math.max(-1,
        Math.min(1, (midi - 64) / 44));

    pan1.pan.value = Math.max(-1, Math.min(1, keyboardPan - 0.1));
    pan2.pan.value = Math.max(-1, Math.min(1, keyboardPan));
    pan3.pan.value = Math.max(-1, Math.min(1, keyboardPan + 0.1));

    if (midi < 48) {
        osc1.type = "triangle";
        osc2.type = "triangle";
        osc3.type = "triangle";
    } else {
        osc1.type = "sawtooth";
        osc2.type = "triangle";
        osc3.type = "sawtooth";
    }

    osc1.detune.value = -detune;
    osc2.detune.value = 0;
    osc3.detune.value = detune;

    const gain1 = ctx.createGain();
    gain1.gain.value = 0.2;

    const gain2 = ctx.createGain();
    gain2.gain.value = 0.6;

    const gain3 = ctx.createGain();
    gain3.gain.value = 0.2;

    const filter = ctx.createBiquadFilter();
    filter.type = "lowpass";
    filter.frequency.value =
        Math.min(5000, freq * 4);
    filter.Q.value = 0.7;

    osc1.connect(gain1);
    osc2.connect(gain2);
    osc3.connect(gain3);

    gain1.connect(pan1);
    gain2.connect(pan2);
    gain3.connect(pan3);

    pan1.connect(filter);
    pan2.connect(filter);
    pan3.connect(filter);

    filter.connect(gain);
    const voice = {
        osc1,
        osc2,
        osc3,
        gain,
        gain1,
        gain2,
        gain3,
        pan1,
        pan2,
        pan3,
        filter,
        freq,
        detune
    };

    return voice;

}

function startVoice(voice, when) {

    voice.osc1.detune.setValueAtTime(-voice.detune, when);
    voice.osc1.detune.linearRampToValueAtTime(-voice.detune * 0.3, when + 0.5);

    voice.osc3.detune.setValueAtTime( voice.detune, when);
    voice.osc3.detune.linearRampToValueAtTime( voice.detune * 0.3, when + 0.5);

    voice.gain.gain.setValueAtTime(0.0001, when);
    voice.gain.gain.exponentialRampToValueAtTime(0.15, when + 0.003);

    const cutoff = voice.freq * 3;

    voice.filter.frequency.setValueAtTime(cutoff, when);
    voice.filter.frequency.exponentialRampToValueAtTime(
        cutoff * 0.5,
        when + 0.3
    );

    voice.osc1.start(when);
    voice.osc2.start(when);
    voice.osc3.start(when);
}

function playNoteNow(midi){

    const when = audioContext.currentTime;

    const voice = createVoice(midi);
    activeVoices.set(midi, voice);

    startVoice(voice, when);

    return when;
}

function stopVoice(midi){

    const voice =
        activeVoices.get(midi);

    if(!voice){
        return;
    }

	const now =
		audioContext.currentTime;

    voice.gain.gain.cancelScheduledValues(now);
    voice.gain.gain.setValueAtTime(
        voice.gain.gain.value,
        now
    );
    voice.gain.gain.exponentialRampToValueAtTime(
        0.0001,
        now + 0.05
    );
        voice.osc1.stop(now + 0.05);
        voice.osc2.stop(now + 0.05);
        voice.osc3.stop(now + 0.05);

    setTimeout(() => {

        voice.osc1.disconnect();
        voice.osc2.disconnect();
        voice.osc3.disconnect();

        voice.gain1.disconnect();
        voice.gain2.disconnect();
        voice.gain3.disconnect();

        voice.pan1.disconnect();
        voice.pan2.disconnect();
        voice.pan3.disconnect();

        voice.filter.disconnect();
        voice.gain.disconnect();

    }, 100);

    activeVoices.delete(midi);

}

function offSound(){

    currentMidis.forEach(midi => {
		
		stopNoteNow(midi);
        
		const t = getCurrentTick();

        const x_bpm = num("x_bpm");

        const minDurSeconds = 0.05;

            minDurSeconds *
            x_bpm *
            ticksPerQuarterNote / 60;

        for(
            let i = recordData.length - 1;
            i >= 0;
            i--
        ){

            const ev = recordData[i];

            if(
                ev.midi === midi &&
                ev.stop === null
            ){

                ev.stop = Math.max(
                    t,
                    ev.start + minDur
                );

                break;
            }
        }
    });

    currentMidis.clear();
}

let currentViewTick = 0;

function loopPlayback(){

    if (!isPlaying) return;

    const tick = getCurrentTick();

    currentViewTick = tick;

    if (tick >= songLengthTicks) {

        if (isRecording) {
            stopRecording();
        } else {
            stopPlayback();
        }

        return;
    }

    setVal("x_targetMeasure", Math.floor(tick / ticksPerMeasure) + 1);

    renderPlayBack(tick);

    if (enablePlaybackSound){
        scheduleNotes(noteData, tick);
    }

    rafId = requestAnimationFrame(loopPlayback);
}

function initPlayback() {

    const ctx = audioContext;

    playbackOffsetTime =
        ctx.currentTime -
        tickToSec(pauseTick);

    prevTick = pauseTick;
    nextIndex = -1;

}

function setPlaybackTarget(renderer, data) {
    renderPlayBack = renderer;
    noteData = data;
}

function playNote(midi, durationTick, startTick) {

    const voice = createVoice(midi);

    const startTime =
        playbackOffsetTime + tickToSec(startTick);

    const duration =
        tickToSec(durationTick);

    startVoice(voice, startTime);
    stopVoiceLater(voice, startTime, duration);

}


function stopVoiceLater(voice, startTime, duration) {

    const stopTime = startTime + duration;

    voice.gain.gain.setValueAtTime(0.15, stopTime);
    voice.gain.gain.exponentialRampToValueAtTime(
        0.0001,
        stopTime + 0.05
    );

    voice.osc1.stop(stopTime + 0.05);
    voice.osc2.stop(stopTime + 0.05);
    voice.osc3.stop(stopTime + 0.05);
}

}


function scheduleNotes(dataArray, tick){

	const data0 = dataArray;

    // 最初だけ検索
    if (nextIndex < 0){

        nextIndex = 0;

        while (
            nextIndex < data0.length &&
            data0[nextIndex].start < prevTick
        ){
            nextIndex++;
        }
    }

    const x_bpm = num("x_bpm");

    const currentTick  = Math.floor(tick);
    const previousTick = Math.floor(prevTick);

    const lookAheadTicks =
        0.1 * x_bpm * ticksPerQuarterNote / 60;

    while (nextIndex < data0.length){

        const data = data0[nextIndex];

        if (data.start > currentTick + lookAheadTicks){
            break;
        }

        if (
            data.stop != null &&
            data.start >= previousTick &&
            data.start <= currentTick + lookAheadTicks
        ){

            playNote(
                data.midi,
                Math.max(1, data.stop - data.start),
                data.start
            );
        }

        nextIndex++;
    }

    prevTick = tick;
}


function midiToFreq(midi){

    return 440 * Math.pow(
        2,
        (midi - 69) / 12
    );
}

let notePosition = [];


function lineScore(tick){
    notePosition = [];
	ctx.clearRect(0,0,canvas.width,canvas.height);
	szx = canvas.width;
	szy = canvas.height-2*my;
	szk = szx-2*mx;
	ctx.lineWidth=1;
	let scoreViewData;
	
	const view = getViewInfo();

	for(let l=0;l<Number(view.kn);l++){
		let k=Number(view.midi_min)+l;
		ctx.fillStyle=workingColor.oct[Math.floor(k/12)-1];
		ctx.fillRect(mx+l*view.kw,0,view.kw,my/2);
		ctx.fillStyle=workingColor.pc[k%12];
		ctx.fillRect(mx+l*view.kw,my/2,view.kw,my/2);
		if (k%12===1 || k%12===3 || k%12===6 || k%12===8 || k%12===10){
		ctx.fillStyle=workingColor.line[0];
		ctx.fillRect(mx+l*view.kw,my,view.kw,szy);
		}else if (k%12===0){
		ctx.beginPath();
		ctx.moveTo(mx+l*view.kw,my);
		ctx.lineTo(mx+l*view.kw,my+szy);
		ctx.strokeStyle=workingColor.line[1];
		ctx.stroke();
		}else if (k%12===5){
		ctx.beginPath();
		ctx.moveTo(mx+l*view.kw,my);
		ctx.lineTo(mx+l*view.kw,my+szy);
		ctx.strokeStyle=workingColor.line[2];
		ctx.stroke();
		}
	}

	if (tick<songLengthTicks){
		ctx.beginPath();
		ctx.moveTo(0,my+tick%(measuresPerScreen*ticksPerMeasure)*szy/(measuresPerScreen*ticksPerMeasure));

	ctx.beginPath();
	ctx.moveTo(0,my+szy);
	ctx.lineTo(mx+szk,my+szy);
	ctx.strokeStyle=workingColor.line[3];
	ctx.stroke();

	for(let m=0;m<songLengthTicks;m=m+ticksPerQuarterNote/timeSignatureDenominator*4){

			ctx.beginPath();
			ctx.moveTo(mx,my+m%(measuresPerScreen*ticksPerMeasure)*szy/(measuresPerScreen*ticksPerMeasure));

			ctx.strokeStyle=workingColor.line[4];
			ctx.stroke();
			}
	}

	for(let i=0;i<view.scoreViewData.length;i++){
		let midi = view.scoreViewData[i].midi;
		let start = view.scoreViewData[i].start;
		let stop = view.scoreViewData[i].stop;

		else if(track == practiceSettings.handsTrackChannel.left.track
		 && channel == practiceSettings.handsTrackChannel.left.channel){
			handColor =
				workingColor.hand[
					HAND_COLOR.SCORE_LEFT
				];
		}
		if (dp >=0 && dt < measuresPerScreen*3/4){
			const x0 = (midi-view.midi_min)*view.kw+mx;
			const x1 = (midi-view.midi_min+0.5)*view.kw+mx;
			const y = my+start%(measuresPerScreen*ticksPerMeasure)*szy/(measuresPerScreen*ticksPerMeasure);

function calcPitchAccuracy(diffData){

    let correct = 0;
    let count = 0;

    for(const d of diffData){

        if(d.missed || d.extra){
            continue;
        }

        count++;

        if(d.pitchDiff === 0){
            correct++;
        }
    }

    if(count === 0){
        return 0;
    }

    return Math.round(correct / count * 100);
}

function calcAttackAccuracy(diffData){

    let total = 0;
	let count = 0;

	for(const d of diffData){

        if(d.missed || d.extra){
            continue;
        }

        count++;

		const err =
            Math.abs(d.attackDiff);

        let score;

        if(err <= ticksPerQuarterNote * 0.05){

            score = 100;

        }else if(err <= ticksPerQuarterNote * 0.10){

            score = 90;

        }else if(err <= ticksPerQuarterNote * 0.20){

            score = 70;

        }else if(err <= ticksPerQuarterNote * 0.30){

            score = 40;

        }else{

            score = 0;
        }

        total += score;
    }

    return count ? Math.round(total / count) : 0;
}

function calcReleaseAccuracy(diffData){

    let total = 0;
	let count = 0;

	for(const d of diffData){

        if(d.missed || d.extra){
            continue;
        }

        count++;

        const err =
            Math.abs(d.releaseDiff);

        let score;

        if(err <= ticksPerQuarterNote * 0.05){

            score = 100;

        }else if(err <= ticksPerQuarterNote * 0.10){

            score = 90;

        }else if(err <= ticksPerQuarterNote * 0.20){

            score = 70;

        }else if(err <= ticksPerQuarterNote * 0.30){

            score = 40;

        }else{

            score = 0;
        }

        total += score;
    }

    return count ? Math.round(total / count) : 0;
}


function calcVelocityAccuracy(diffData){

    let total = 0;
	let count = 0;

	for(const d of diffData){

        if(d.missed || d.extra){
            continue;
        }

        count++;

        const err =
            Math.abs(d.velocityDiff);

        let score;

        if(err <= 5){

            score = 100;

        }else if(err <= 10){

            score = 90;

        }else if(err <= 20){

            score = 70;

        }else if(err <= 40){

            score = 40;

        }else{

            score = 0;
        }

        total += score;
    }

    return count ? Math.round(total / count) : 0;
}


function calcOverallAccuracy(diffData){

	const pitchAccuracy = Math.round(calcPitchAccuracy(diffData));
	const attackAccuracy = Math.round(calcAttackAccuracy(diffData));
	const releaseAccuracy = Math.round(calcReleaseAccuracy(diffData));
	const velocityAccuracy = Math.round(calcVelocityAccuracy(diffData));

	const Overall = Math.round(
		0.5 * pitchAccuracy +
		0.25 * attackAccuracy +
		0.2 * releaseAccuracy +
		0.05 * velocityAccuracy
	);

	return Overall;
}

function drawGraph(
    diffData,
    key,
    title,
    offsetY,
    color,
    scaleY,
    showMeasureLabel
){
	
    const graphHeight = 100;

	const titleHeight = 30;

    const w = canvas.width - 2 * mx;

    const centerY =
        offsetY + graphHeight / 2;

    // タイトル
    ctx.fillStyle = "black";

    ctx.font = "20px sans-serif";

    ctx.fillText(
        title,
        50,
        offsetY + 20
    );

    // 中央線
    ctx.strokeStyle = "#888";

    ctx.beginPath();

    ctx.moveTo(
        mx,
        centerY
    );

    ctx.lineTo(
        mx + w,
        centerY
    );

    ctx.stroke();

	const maxTick =
		Math.max(
			...scoreData.map(n => n.start)
		);
		
	// --------------------
    // 小節線だけ描画
    // --------------------

		ctx.strokeStyle = "#ddd";

		ctx.fillStyle = "black";
	
		const drawnMeasures =
		new Set();

	for(let i = 0; i < diffData.length; i++){

		const measure =
			diffData[i].measure;

		if(
			drawnMeasures.has(
				measure
			)
		){
			continue;
		}

		drawnMeasures.add(
			measure
		);

		const x = mx + diffData[i].tick / maxTick * w;

		const maxMeasure =
    		diffData[diffData.length - 1].measure;

		const maxLabels = 30;

		const measureStep =
			Math.max(
				1,
				Math.ceil(maxMeasure / maxLabels)
			);

		if(
			showMeasureLabel
			&&
			(measure - 1) % measureStep === 0
		){
			ctx.fillText(
				measure,
				x,
				offsetY + graphHeight
			);
		}

		ctx.beginPath();

		ctx.moveTo(
			x,
			offsetY + titleHeight
		);

		ctx.lineTo(
			x,
			offsetY +
			(graphHeight - titleHeight)
		);

		ctx.stroke();
	}
    // --------------------
    // 折れ線描画
    // --------------------

    ctx.strokeStyle = color;

    ctx.fillStyle = color;

    ctx.lineWidth = 2;

    ctx.beginPath();

	for(let i = 0; i < diffData.length; i++){

		const x =
			mx +
			diffData[i].tick
			/ maxTick
			* w;

		const y =
			centerY
			-
			diffData[i][key] * scaleY;

			// 点
			ctx.fillRect(
				x - 2,
				y - 2,
				4,
				4
			);

			// 折れ線
			if(i === 0){

				ctx.moveTo(x, y);

			}else{

				ctx.lineTo(x, y);
			}
		}

    ctx.stroke();
}

function drawPedalGraph(
    pedalData,
    title,
    offsetY,
	color,
    showMeasureLabel

){

	if(pedalData.length === 0){
    return;
	}
	
	const pedalGraphData = [];

	for(const p of pedalData){

		pedalGraphData.push({

			cc: p.cc,

			measure:
				Math.floor(
					p.start / ticksPerMeasure
				) + 1,

			tick: p.start,

			pedalValue: p.value
		});
	}

    const graphHeight = 100;

	const titleHeight = 30;

    const w = canvas.width - 2 * mx;

	const topY = offsetY + 40;

	const bottomY = offsetY + 80;

	const maxTick =
		Math.max(
			...scoreData.map(n => n.start)
		);		

	// タイトル

	ctx.fillStyle = "black";

    ctx.font = "20px sans-serif";

    ctx.fillText(
        title,
        50,
        offsetY + 20
    );
		
	// --------------------
    // 小節線だけ描画
    // --------------------
	ctx.strokeStyle = "#ddd";

	ctx.fillStyle = "black";

	const totalMeasures =
		Math.ceil(
			maxTick / ticksPerMeasure
		);

	for(
		let m = 1;
		m <= totalMeasures;
		m++
	){

		const tick =
			(m - 1) * ticksPerMeasure;

		const x =
			mx +
			tick / maxTick * w;

		if(showMeasureLabel){

			ctx.fillText(
				m,
				x,
				offsetY + graphHeight
			);
		}

		ctx.beginPath();

		ctx.moveTo(
			x,
			offsetY + titleHeight
		);

		ctx.lineTo(
			x,
			offsetY + (graphHeight - titleHeight)
		);

		ctx.stroke();
	}

    // --------------------
    // 折れ線描画
    // --------------------

    ctx.strokeStyle = color;

    ctx.fillStyle = color;

    ctx.lineWidth = 2;

	
	let prevY = null;

	ctx.beginPath();

	for(let i = 0; i < pedalGraphData.length; i++){

		const x =
			mx +
			pedalGraphData[i].tick / maxTick * w;

		const y =
			bottomY
			-
			pedalGraphData[i].pedalValue / 127
			*
			(bottomY - topY);

		if(i === 0){

			ctx.moveTo(x, y);

		}else{

			ctx.lineTo(x, prevY);
			ctx.lineTo(x, y);
		}

		prevY = y;
	}

	const lastX =
		mx + w;

	ctx.lineTo(
		lastX,
		prevY
	);

	ctx.stroke();
}



//
// Analysis Record Data
//

function matchNotes(scoreData, recordData){

    const m = scoreData.length;
    const n = recordData.length;

    const dp = [];
	const MISS_COST = 50;

    for(let i=0; i<=m; i++){

        dp[i] = [];

        for(let j=0; j<=n; j++){

            dp[i][j] = Infinity;
        }
    }

    dp[0][0] = 0;

    for(let i=0; i<=m; i++){

        for(let j=0; j<=n; j++){

            if(i < m && j < n){

                const s = scoreData[i];
                const r = recordData[j];

                const pitchCost =
                    Math.abs(s.midi - r.midi);

                const timeCost =
                    Math.abs(s.start - r.start) / 100;

				const durationCost =
					Math.abs(
						(s.stop - s.start)
						-
						(r.stop - r.start)
					) / 100;

				const matchCost =
					pitchCost * 10 +
					timeCost +
					durationCost;

                dp[i+1][j+1] =
                    Math.min(
                        dp[i+1][j+1],
                        dp[i][j] + matchCost
                    );
            }

            // 楽譜側欠落
            if(i < m){

                dp[i+1][j] =
                    Math.min(
                        dp[i+1][j],
                        dp[i][j] + MISS_COST
                    );
            }

            // 余計な音
            if(j < n){

                dp[i][j+1] =
                    Math.min(
                        dp[i][j+1],
                        dp[i][j] + MISS_COST
                    );
            }
        }
    }

    const pairs = [];

    let i = m;
    let j = n;

    while(i > 0 || j > 0){

        if(
            i > 0 &&
            j > 0
        ){

            const s = scoreData[i-1];
            const r = recordData[j-1];

            const pitchCost =
                Math.abs(s.midi - r.midi);

            const timeCost =
                Math.abs(s.start - r.start) / 100;

			const durationCost =
				Math.abs(
					(s.stop - s.start)
					-
					(r.stop - r.start)
				) / 100;

			const matchCost =
				pitchCost * 10 +
				timeCost +
				durationCost;

            if(
                Math.abs(
                    dp[i][j] -
                    (dp[i-1][j-1] + matchCost)
                ) < 0.0001
            ){

                pairs.unshift({

                    scoreIndex: i-1,
                    recordIndex: j-1,

                    score: s,
                    record: r

                });

                i--;
                j--;

                continue;
            }
        }

        if(
            i > 0 &&
            Math.abs(
                dp[i][j] -
                (dp[i-1][j] + MISS_COST)
            ) < 0.0001
        ){

            pairs.unshift({

                scoreIndex: i-1,
                recordIndex: null,

                score: scoreData[i-1],
                record: null

            });

            i--;

            continue;
        }

        if(j > 0){

            pairs.unshift({

                scoreIndex: null,
                recordIndex: j-1,

                score: null,
                record: recordData[j-1]

            });

            j--;
        }
    }

    return pairs;

	const matched =
		pairs.filter(
			p => p.score && p.record
		);

	console.log(
		"matched",
		matched.length
	);

}


function createDiffData(pairs){

    diffData = [];   // ←追加

	for(const pair of pairs){

		// 弾き忘れ
		if(
			pair.score != null &&
			pair.record == null
		){

			diffData.push({

				missed: true,

				tick:
					pair.score.start,

				measure:
					Math.floor(
						pair.score.start /
						ticksPerMeasure
					) + 1
			});

			continue;
		}

		// 余計な音
		if(
			pair.score == null &&
			pair.record != null
		){

			diffData.push({

				extra: true,

				tick:
					pair.record.start,

				measure:
					Math.floor(
						pair.record.start /
						ticksPerMeasure
					) + 1
			});

			continue;
		}

		const s = pair.score;
		const r = pair.record;

		diffData.push({

			tick: s.start,

			pitchDiff:
				r.midi - s.midi,

			attackDiff:
				r.start - s.start,

			releaseDiff:
				r.stop - s.stop,

			velocityDiff:
				r.velocity -
				s.velocity,

			measure:
				Math.floor(
					s.start /
					ticksPerMeasure
				) + 1
		});
	}

	diffData.sort(
		(a,b) => a.tick - b.tick
	);

    return diffData;

}

function createPracticeStats(diffData){

    const stats = {};

    for(const d of diffData){
    
        const m = d.measure;

        if(!stats[m]){

			stats[m] = {
				measure: m,
				missed: 0,
				extra: 0,
				pitch: 0,
				attack: 0,
				release: 0,
				velocity: 0,
				total: 0
			};
        }

		if(d.missed){
			stats[m].missed++;
			stats[m].total += 10;
			continue;
		}

		if(d.extra){
			stats[m].extra++;
			stats[m].total += 5;
			continue;
		}

		if(Math.abs(d.pitchDiff) > 0){
			stats[m].pitch++;
			stats[m].total += 8;
		}

		if(Math.abs(d.attackDiff) > ticksPerQuarterNote/8){
			stats[m].attack++;
			stats[m].total += 1;
		}

		if(Math.abs(d.releaseDiff) > ticksPerQuarterNote/8){
			stats[m].release++;
			stats[m].total += 1;
		}

		if(Math.abs(d.velocityDiff) > 20){
			stats[m].velocity++;
			stats[m].total += 1;
		}
	}

    return Object.values(stats);
}

function createPracticeRanking(diffData){

    const stats =
        createPracticeStats(diffData);

    stats.sort(
        (a,b) => b.total - a.total
    );

    return stats;
	
}

//
// Get Midi Sound
//

function onMIDISuccess(midiAccess){

    for(let input of midiAccess.inputs.values()){

        input.onmidimessage =
            onMIDIMessage;
    }
}

function canInput(){
    return isRecording;
}

function onMIDIMessage(event){

    if(!canInput()) return;

    inputRouter(event, "midi");

    const [status, data1, data2] = event.data;

    const command = status & 0xf0;
	const channel = status & 0x0f;
	const audioNow =
	    audioContext.currentTime;

    const x_bpm = num("x_bpm");

	const latency = 0.04;

	const t =
	(
		audioNow
		- playbackOffsetTime
		+ latency
	)
	* x_bpm
	* ticksPerQuarterNote
	/ 60;

    // ペダル
    if(command === 0xb0){
		const cc = data1;
        const value = data2;

		console.log(
				"CC",
				data1,
				"value",
				data2
			);

		if(
			cc === 64 ||
			cc === 66 ||
			cc === 67
		){
			if(isRecording){

				pedalData.push({
					channel,
					cc,
					value,
					start: t
				});
			}
		}

		console.log(pedalData);
	}

	// Note On
	if(command === 0x90 && data2 > 0){

		const note = data1;
		const velocity = data2;

		// 音は常に鳴らす
		noteOn(note, velocity);

		// 録音中だけ記録する
		if(isRecording){

			const noteData = {
				channel,
				midi: note,
				start: t,
				stop: null,
				velocity
			};

			recordData.push(noteData);

			const key =
				channel + "_" + note;

			activeNotes[key] = noteData;
		}
	}
	// Note Off
	if(
		command === 0x80 ||
		(
			command === 0x90 &&
			data2 === 0
		)
	){

		const note = data1;

		noteOff(note);

		if(isRecording){

			const key =
				channel + "_" + note;

			if(activeNotes[key]){

				activeNotes[key].stop = t;

				delete activeNotes[key];
			}
		}
	}
}

function noteToFreq(note){

    return 440 *
        Math.pow(
            2,
            (note - 69) / 12
        );
}

function noteOn(note, velocity){

	console.log(status, note, velocity);

    if(oscillators[note]){

        oscillators[note].stop();

        delete oscillators[note];
    }

    const osc =
        audioContext.createOscillator();

    const gain =
        audioContext.createGain();

    osc.type = "sine";

    osc.frequency.value =
        noteToFreq(note);

    gain.gain.value =
        velocity / 127 * 0.2;

    osc.connect(gain);
    gain.connect(audioContext.destination);

    osc.start();

    oscillators[note] = osc;
}


function noteOff(note){

    const osc = oscillators[note];

    if(!osc) return;

    osc.stop();

    delete oscillators[note];
}

//
// Save Midi
//

function createMidiEvents(noteData, pedalData1=[]){

    const events = [];

    for(const n of noteData){

        events.push({
            tick: Math.round(n.start),
            type: "on",
            channel: n.channel,
            note: n.midi,
            velocity: n.velocity
        });

        if(n.stop != null){

            events.push({
                tick: Math.round(n.stop),
                type: "off",
                channel: n.channel,
                note: n.midi
            });
        }
    }

    for(const p of pedalData1){

        events.push({
            tick: Math.round(p.start),
            type: "cc",
            channel: p.channel,
            cc: p.cc,
            value: p.value
        });
    }

    events.sort(
        (a,b) => a.tick - b.tick
    );

    return events;
}

function writeVLQ(value){

    let buffer = value & 0x7F;
    const bytes = [];

    while((value >>= 7)){

        buffer <<= 8;
        buffer |=
            ((value & 0x7F) | 0x80);
    }

    while(true){

        bytes.push(buffer & 0xFF);

        if(buffer & 0x80){

            buffer >>= 8;

        }else{

            break;
        }
    }

    return bytes;
}

function createTrackData(
    noteData,
    pedalData1=[]
){

    const track = [];

	//Program Change (C0)
	track.push(
		0x00,
		0xC0,
		0x00
	);

    let prevTick = 0;

	const events =
    createMidiEvents(
        noteData,
        pedalData1
    );

    for(const e of events){

        const delta =
            e.tick - prevTick;

        prevTick = e.tick;

        track.push(
            ...writeVLQ(delta)
        );

        if(e.type === "on"){

            track.push(
                0x90 | e.channel,
                e.note,
                e.velocity
            );
        }

        if(e.type === "off"){

            track.push(
                0x80 | e.channel,
                e.note,
                0
            );
        }

        if(e.type === "cc"){

            track.push(
                0xB0 | e.channel,
                e.cc,
                e.value
            );
        }
    }

    // End Of Track
    track.push(
        0x00,
        0xFF,
        0x2F,
        0x00
    );

    return track;
}

function createMetaTrackData(){

    const track = [];

    const mpqn =
        Math.round(
            60000000 / num("x_bpm")
        );

    track.push(
        0x00,
        0xFF,
        0x51,
        0x03,
        (mpqn >> 16) & 255,
        (mpqn >> 8) & 255,
        mpqn & 255
    );

    track.push(
        0x00,
        0xFF,
        0x58,
        0x04,
        beatsPerMeasure,
        Math.round(Math.log2(timeSignatureDenominator)),
        24,
        8
    );

    track.push(
        0x00,
        0xFF,
        0x2F,
        0x00
    );

    return track;
}

function addTrack(
    bytes,
    trackData
){

    const len =
        trackData.length;

    bytes.push(
        0x4d,0x54,0x72,0x6b,
        (len>>24)&255,
        (len>>16)&255,
        (len>>8)&255,
        len&255
    );

    bytes.push(...trackData);
}

function saveMidi(){

	const scoreRight =
		scoreData.filter(
			n =>
				n.track === practiceSettings.handsTrackChannel.right.track &&
				n.channel === practiceSettings.handsTrackChannel.right.channel
		);

	const scoreLeft =
		scoreData.filter(
			n =>
				n.track === practiceSettings.handsTrackChannel.right.track &&
				n.channel === practiceSettings.handsTrackChannel.right.channel
		);
		
    const bytes = [];

    // MThd
    bytes.push(
        0x4d,0x54,0x68,0x64,
        0x00,0x00,0x00,0x06,
        0x00,0x01,
        0x00,0x04,
        (ticksPerQuarterNote>>8)&255,
        ticksPerQuarterNote&255
    );

	addTrack(
		bytes,
		createMetaTrackData()
	);

	addTrack(
		bytes,
		createTrackData(scoreRight)
	);

	addTrack(
		bytes,
		createTrackData(scoreLeft)
	);

	addTrack(
		bytes,
		createTrackData(recordData,pedalData)
	);

	const blob =
        new Blob(
            [new Uint8Array(bytes)],
            {type:"audio/midi"}
        );

    const url =
        URL.createObjectURL(blob);

    const a =
        document.createElement("a");

const songName =
    val("song1");

	const fileName =
    `${songName}-${getCurrentDateTimeString()}.mid`;

	a.href = url;
    a.download = fileName;	
    a.click();
}

function getCurrentDateTimeString(){

    const now = new Date();

    const y = now.getFullYear();

    const m = String(
        now.getMonth() + 1
    ).padStart(2, "0");

    const d = String(
        now.getDate()
    ).padStart(2, "0");

    const h = String(
        now.getHours()
    ).padStart(2, "0");

    const min = String(
        now.getMinutes()
    ).padStart(2, "0");

    const s = String(
        now.getSeconds()
    ).padStart(2, "0");

    return `${y}${m}${d}-${h}${min}${s}`;
}


function getDateTimeString(ms){

    const d = new Date(ms);

    const y = d.getFullYear();

    const m = String(
        d.getMonth() + 1
    ).padStart(2, "0");

    const day = String(
        d.getDate()
    ).padStart(2, "0");

    const h = String(
        d.getHours()
    ).padStart(2, "0");

    const min = String(
        d.getMinutes()
    ).padStart(2, "0");

    const s = String(
        d.getSeconds()
    ).padStart(2, "0");

    return `${y}${m}${day}-${h}${min}${s}`;
}

	showSelectedView();

function goToFirstMeasure(){
	audioContext.resume();
	canvas.width = window.innerWidth;
	canvas.height = window.innerHeight;
    pauseTick = 0;
	setVal("x_targetMeasure", 1);
    showSelectedView();
}

function goToLastMeasure(){
    pauseTick=Math.floor(songLengthTicks/ticksPerMeasure-1)*ticksPerMeasure;
	setVal("x_targetMeasure", Math.floor(pauseTick/ticksPerMeasure)+1);
    showSelectedView();
}

function goBackOneMeasure(){
    if((num("x_targetMeasure")-1)*ticksPerMeasure>0){
        pauseTick=(num("x_targetMeasure")-2)*ticksPerMeasure;
		playbackOffsetTime = audioContext.currentTime - (pauseTick / ticksPerSecond);
		nextIndex = -1;
		prevTick = pauseTick;
		setVal("x_targetMeasure", Math.floor(pauseTick/ticksPerMeasure)+1);
    }else{
        goToFirstMeasure();	
    }
    showSelectedView();
}

function goBackOnePage(){
    if((num("x_targetMeasure")-1-measuresPerScreen)*ticksPerMeasure>0){
        pauseTick=(num("x_targetMeasure")-1-measuresPerScreen)*ticksPerMeasure;
		playbackOffsetTime = audioContext.currentTime - (pauseTick / ticksPerSecond);
		nextIndex = -1;
		prevTick = pauseTick;
		setVal("x_targetMeasure", Math.floor(pauseTick/ticksPerMeasure)+1);
    }else{
        goToFirstMeasure();	
    }
    showSelectedView();
}

    if(num("x_targetMeasure")*ticksPerMeasure<songLengthTicks){
        pauseTick=num("x_targetMeasure")*ticksPerMeasure;
		playbackOffsetTime = audioContext.currentTime - (pauseTick / ticksPerSecond);
		nextIndex = -1;

		setVal("x_targetMeasure", Math.floor(pauseTick/ticksPerMeasure)+1);
     }

}

    if((num("x_targetMeasure")-1+measuresPerScreen)*ticksPerMeasure<songLengthTicks){
        pauseTick=(num("x_targetMeasure")-1+measuresPerScreen)*ticksPerMeasure;
		playbackOffsetTime = audioContext.currentTime - (pauseTick / ticksPerSecond);
		nextIndex = -1;
		prevTick = pauseTick;
		setVal("x_targetMeasure", Math.floor(pauseTick/ticksPerMeasure)+1);
    }else{
        goToLastMeasure();	
    }
    showSelectedView();

function trackChannelInfo(){

	ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.font = "15px Arial";
    ctx.fillStyle = "black";
	
	const infoMap = {};
	
	for(const note of scoreData){

		const key =
			note.track + "_" +
			note.channel;

		if(!infoMap[key]){

			infoMap[key] = {

				track:
					note.track,

				channel:
					note.channel,

				sum: 0,

				count: 0
			};
		}

		infoMap[key].sum +=
			note.midi;

		infoMap[key].count++;
	}

		const rows =
		Object.values(infoMap);

	rows.forEach(row => {

		row.avg =
			row.sum /
			row.count;
	});
	
	const channelInstrument = {};

	rawMidi.tracks.forEach(track => {

		track.forEach(event => {

			if(event.type === "programChange"){

				channelInstrument[
					event.channel
				] =
					event.programNumber;
			}

		});

	});

	console.log(channelInstrument);

	rows.forEach(row => {

		const instNumber =
			channelInstrument[row.channel];

		row.instrument =
			instName[instNumber] || "-";

	});
	ctx.fillText("Color",100,50);
	ctx.fillText("Hand",160,50);
	ctx.fillText("Track",280,50);
	ctx.fillText("Channel",360,50);
	ctx.fillText("Notes",460,50);
	ctx.fillText("Avg MIDI",540,50);
	ctx.fillText("Instrument",660,50);

		rows.forEach((row,i)=>{

		const y =
			30*(i+1)+50;

		let handColor =
			workingColor.hand[
				HAND_COLOR.SCORE_NOT_ASSIGNED
			];
		let handName = HANDS_LABEL[HANDS.OTHER];;

		if(row.track == practiceSettings.handsTrackChannel.right.track && 
		row.channel == practiceSettings.handsTrackChannel.right.channel){
			handColor =
				workingColor.hand[
					HAND_COLOR.SCORE_RIGHT
				];
			handName = HANDS_LABEL[HANDS.RIGHT];
		}
		else if(row.track == practiceSettings.handsTrackChannel.left.track && 
		row.channel == practiceSettings.handsTrackChannel.left.channel){
			handColor =
				workingColor.hand[
					HAND_COLOR.SCORE_LEFT
				];
			handName = HANDS_LABEL[HANDS.LEFT];
		}
		
		ctx.fillStyle = handColor;

		ctx.beginPath();
		ctx.arc(
			110,
			y-5,
			10,
			0,
			2*Math.PI
		);

		ctx.fill();

		ctx.fillStyle =
			"black";

		ctx.fillText(
			handName,
			160,
			y
		);

		ctx.fillText(
				row.track,
				280,
				y
			);

		ctx.fillText(
			row.channel,
			360,
			y
		);

		ctx.fillText(
			row.count,
			460,
			y
		);

		ctx.fillText(
			row.avg.toFixed(1),
			540,
			y
		);

		ctx.fillText(
			row.instrument,
			660,
			y
		);

	});
}

function findNote(x,y){

    for(let i=0;i<notePosition.length;i++){

        const n = notePosition[i];

        if(
            Math.abs(x-n.x)<20 &&
            Math.abs(y-n.y)<20
        ){
            return i;
        }
    }

    return -1;
}

 // Define a function 'standardDeviation' to calculate the standard deviation of an array
 const standardDeviation = (arr, usePopulation = false) => {
  // Calculate the mean of the array
  const mean = arr.reduce((acc, val) => acc + val, 0) / arr.length;
  
  // Calculate the sum of squared differences from the mean
  const sumOfSquaredDifferences = arr.reduce((acc, val) => acc.concat((val - mean) ** 2), [])
                                      .reduce((acc, val) => acc + val, 0);
  
  // Calculate the standard deviation
  return Math.sqrt(sumOfSquaredDifferences / (arr.length - (usePopulation ? 0 : 1)));
};
