<script>
	
/*
Constants
    ├─ Color Settings

Global Variables

//========================================
// naming rule for function
//========================================
//
// read...Ui(): from Ui to data
// on...Change(): action on event onchange 
// update...Ui(): from data to Ui
// save...(): from data to localStorage
// loadSaved..(): from localStorage to data
// reset...(): from default to data
//

//========================================
// UI Value
//========================================

function $(id) {
    return document.getElementById(id);
}

function val(id) {
    return $(id).value;
}

function num(id) {
    return Number($(id).value);
}

function chk(id) {
    return $(id).checked;
}

function setVal(id, value) {
    $(id).value = value;
}

//========================================
// UI Array Value
//========================================


function readUi(array, prefix) {

    for (let i = 0; i < array.length; i++) {
        array[i] = val(prefix + i);
    }
}

function writeUi(array, prefix) {

    for (let i = 0; i < array.length; i++) {
        setVal(prefix + i, array[i]);
    }
}

//========================================
// Color Settings
//========================================

const defaultColors={
	oct:["#ffffff","#ff0000","#ff9900","#ffff00","#00ee00","#00ffff","#0000ff","#ff00ff","#ee0099"],
	pc:["#ff0000","#ff9900","#ffff00","#99ff00","#00ee00","#00ff99","#00ffff","#0099ff","#0000ff","#9900ff","#ff00ff","#ee0099"],
	hand:["#ffcc00","#ffccff","#9966ff","#cc99ff","#ccffff"],
	line:["#cccccc","#ff0000","#00ff99","#cc00cc","#0000cc","#999999"],
	text:["#666600","#990000","#009900","#009999","#ff0000"]
}

let workingColors = structuredClone(defaultColors);

const HAND_COLOR = {
    SCORE_RIGHT: 0,
    SCORE_LEFT: 1,
    RECORD_BOTH_CIRCLE: 2,
    RECORD_BOTH_BAR: 3,
    SCORE_NOT_ASSIGNED: 4
};

function readColorsUi(){

	readUi(workingColors.oct, "x_oct_");
	readUi(workingColors.pc, "x_pc_");
	readUi(workingColors.hand, "x_hand_");
	readUi(workingColors.line, "x_line_");
	readUi(workingColors.text, "x_text_");	

}

function onColorsChange(){

    readColorsUi();
    saveColors();
    selview1();

}

function updateColorsUi(){

    writeUi(workingColors.oct,  "x_oct_");
    writeUi(workingColors.pc,   "x_pc_");
    writeUi(workingColors.hand, "x_hand_");
	writeUi(workingColors.line, "x_line_");
    writeUi(workingColors.text, "x_text_");

}

function saveColors() {
    localStorage.setItem(
        "workingColors",
        JSON.stringify(workingColors)
    );
}

function loadSavedColors(){

    const tmp = localStorage.getItem("workingColors");

    if(tmp){
        workingColors = JSON.parse(tmp);
    }else{
        workingColors = structuredClone(defaultColors);
    }
}

function resetColors(){

    workingColors = structuredClone(defaultColors);

    localStorage.removeItem("workingColors");

    updateColorsUi();

    selview1();
}

//========================================
// Lesson Settings
//========================================

const defaultSettings =
{
	version:1,

    songName: "bach-invention-02",

    handsTrackChannel: {
        right: {
            track: 1,
            channel: 1
        },
        left: {
            track: 2,
            channel: 2
        }
    },

	hands: 0,
    measuresPerScreen: 2,
    playbackBpm: 18,
    noteTextType: 11,
    viewSelect: 1
}

let lessonSettings = structuredClone(defaultSettings);

const UI_HAND_ORDER = ["left", "right"];

function getHand(settings, hand) {
    return settings.hands[hand];
}

function getTrack(settings, hand) {
    return settings.hands[hand].track;
}

function getChannel(settings, hand) {
    return settings.hands[hand].channel;
}
function channelToHand(channel) {
    if (channel === 2) return "right";
    if (channel === 3) return "left";
    return null;
}

function handToChannel(settings, hand) {
    return settings.hands[hand].channel;
}


function readSettingsUi() {

    const settings = lessonSettings;

	settings.songName = val("song1");

    settings.handsTrackChannel.right.track = num("x_rightTrack");
    settings.handsTrackChannel.right.channel = num("x_rightChannel");

    settings.handsTrackChannel.left.track = num("x_leftTrack");
    settings.handsTrackChannel.left.channel = num("x_leftChannel");

	settings.hands = num("hands");
    settings.measuresPerScreen = num("measuresPerScreen");
	settings.playbackBpm = num("x_bpm");
	settings.noteTextType = num("nl1");
	settings.viewSelect = num("sv1");

}

let measuresPerScreen = lessonSettings.measuresPerScreen;

function syncMeasuresPerScreen() {

    console.log("syncMeasuresPerScreen");

    measuresPerScreen = lessonSettings.measuresPerScreen;

    console.log("measuresPerScreen=", measuresPerScreen);
}

async function onSettingsChange(){

    readSettingsUi();
    saveSettings();

    syncMeasuresPerScreen();

    await changeSong();

    changeTrackChannel();

    selview1();
}

function updateSettingsUi(){

    const settings = lessonSettings;

	setVal("song1", settings.songName);
	setVal("x_rightTrack", settings.handsTrackChannel.right.track);
	setVal("x_rightChannel", settings.handsTrackChannel.right.channel);
	setVal("x_leftTrack", settings.handsTrackChannel.left.track);
	setVal("x_leftChannel", settings.handsTrackChannel.left.channel);
	setVal("hands", settings.hands);
	setVal("measuresPerScreen", settings.measuresPerScreen);
	setVal("x_bpm", settings.playbackBpm );
	setVal("nl1", settings.noteTextType);
	setVal("sv1", settings.viewSelect);

}


function saveSettings(){

    localStorage.setItem(
        "lessonSettings",
        JSON.stringify(lessonSettings)
    );

}

function loadSavedSettings(){

    const tmp = localStorage.getItem("lessonSettings");

    if(tmp){
        lessonSettings = JSON.parse(tmp);

        // バージョンが違えば初期設定に戻す
        if (lessonSettings.version !== defaultSettings.version) {
            resetSettings();
        }

    }else{
        lessonSettings = structuredClone(defaultSettings);
    }

}

async function resetSettings(){

    lessonSettings = structuredClone(defaultSettings);

    saveSettings();

    updateSettingsUi();

    syncMeasuresPerScreen();

    await changeSong();

    selview1();
}

function onResetSettings(){

    resetSettings();

    updateSettingsUi();
    selview1();
}

// score data

function createScoreDataFromTracks(rawMidi){

    const scoreData = [];

	let n_id = 1;

    rawMidi.tracks.forEach(
        (track, trackNo) => {

            if(trackNo === 0){
                return;
            }

            let tick = 0;

            const activeNotes = {};

            track.forEach(event => {

                tick += event.deltaTime;

                if(
                    event.type === "noteOn"
                    &&
                    event.velocity > 0
                ){

                    const key =
                        event.channel +
                        "_" +
                        event.noteNumber;

                    activeNotes[key] = {

                        start: tick,
                        velocity:
                            event.velocity
                    };
                }

                if(
                    event.type === "noteOff"
                    ||
                    (
                        event.type === "noteOn"
                        &&
                        event.velocity === 0
                    )
                ){

                    const key =
                        event.channel +
                        "_" +
                        event.noteNumber;

                    const note =
                        activeNotes[key];

                    if(note){

                        scoreData.push({

                            midi:
                                event.noteNumber,

                            start:
                                note.start,

                            stop:
                                tick,

                            velocity:
                                note.velocity,

                            channel:
                                event.channel,

                            track:
                                trackNo,

							n_id: 
								n_id++

                        });

						delete activeNotes[key];
                    }
                }
            });
        }
		
    );

	scoreData.sort(
		(a,b)=>a.start-b.start
	);

    return scoreData;
}


function createTempoTrack(){

	const tempoTrack = [];

	let tick = 0;

	rawMidi.tracks[0].forEach(event=>{

		tick += event.deltaTime;

		if(event.type === "setTempo"){

			tempoTrack.push({

				timing: tick,

				value:
					Math.round(
						60000000
						/
						event.microsecondsPerBeat
					)
			});
		}
	});

	return tempoTrack;

}

function createBeatTrack(){

	const beatTrack = [];

	let tick = 0;

	rawMidi.tracks[0].forEach(event=>{

		tick += event.deltaTime;

		if(event.type === "timeSignature"){

			beatTrack.push({

				timing: tick,

				value:[
					event.numerator,
					event.denominator
				]
			});
		}
	});

	return beatTrack;

}

function getSongLength(){

    let maxTick = 0;

    rawMidi.tracks.forEach(track => {

        let tick = 0;

        track.forEach(event => {

            tick += event.deltaTime;
        });

        if(tick > maxTick){

            maxTick = tick;
        }
    });

    return maxTick;
}

function setTsv(data2){

    tsv = {
        raw: "",
        a: [],
        sc: [],
        ff: [],
        ft: [],
        sd: [],
        dl: [],
        t1: [],
        t2: [],
        t3: [],
        t4: [],
        t5: [],
        t6: [],
        t7: [],
        t8: [],
        t9: []
    };

    // ★ TSVが無い場合は空で終了
    if(!data2){
        console.log("TSV is empty (local file or missing)");
        return;
    }

    tsv.raw = data2;

	console.log("=== TSV DEBUG START ===");
	console.log(data2);
	console.log("length:", data2?.length);

	const lines = data2?.split("\n") || [];

	console.log("lines:", lines.length);
	console.log("first line:", lines[0]);
	console.log("first cols:", lines[0]?.split("\t"));

	console.log("=== TSV DEBUG END ===");

//    const lines = data2.split('\n');

    lines.forEach(line => {
        const cols = line.split('\t');
        const type = cols[0];

        if(type === "A"){
            tsv.a.push([cols[1], cols[2]]);
        }else if(type === "B"){
            tsv.sc.push([cols[2]]);
        }else if(type === "C"){
            tsv.ff.push([cols[1], cols[2]]);
            tsv.ft.push([cols[2], cols[1]]);
            tsv.sd.push([cols[3], -cols[3]]);
            tsv.dl.push([cols[4], cols[4]]);
        }else if(type === "D"){
            tsv.t1.push([cols[2]]);
            tsv.t2.push([cols[3]]);
            tsv.t3.push([cols[4]]);
            tsv.t4.push([cols[5]]);
            tsv.t5.push([cols[6]]);
            tsv.t6.push([cols[7]]);
            tsv.t7.push([cols[8]]);
            tsv.t8.push([cols[9]]);
            tsv.t9.push([cols[10]]);
        }
    });
}

function readFileAsArrayBuffer(file){
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
    });
}

function readFileAsText(file){
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsText(file);
    });
}

async function loadLocalFiles(files){

    let midiFile = null;
    let tsvFile = null;

    for(const f of files){
        if(f.name.endsWith(".mid") || f.name.endsWith(".midi")){
            midiFile = f;
        }
        if(f.name.endsWith(".tsv")){
            tsvFile = f;
        }
    }

    const data1 = midiFile
        ? await readFileAsArrayBuffer(midiFile)
        : null;

    const data2 = tsvFile
        ? await readFileAsText(tsvFile)
        : null;

    return { data1, data2 };
}

	let	wait0=60000/Math.max(num("x_bpm"),60);

	for(let i = 3; i > 0; i--){
		ctx.clearRect(0,0,mx,my);
		ctx.fillStyle = "red";
		ctx.fillText(i,15,30);

		await new Promise(r => setTimeout(r, wait0));
	}
}

function touchSound(){

    touchInitialized = true;

    canvas.addEventListener('pointerdown', async (e) => {

        e.preventDefault();

		await audioContext.resume();

        inputRouter(e, "touch"); // ★ここに統一
    });

    document.addEventListener('pointerup', offSound);
    document.addEventListener('pointercancel', offSound);
}

function assignHands(
    recordData,
    scoreRight,
    scoreLeft
){
    const right = [];
    const left = [];

    for(const r of recordData){

        let rightCost = Infinity;
        let leftCost = Infinity;

        for(const s of scoreRight){
			const rLen = r.stop - r.start;
			const sLen = s.stop - s.start;
			const cost =
				Math.abs(r.midi - s.midi)
				+
				Math.abs(r.start - s.start) / 100
				+
				Math.abs(rLen - sLen) / 100;

            rightCost =
                Math.min(
                    rightCost,
                    cost
                );
        }

        for(const s of scoreLeft){
			const rLen = r.stop - r.start;
			const sLen = s.stop - s.start;
			const cost =
				Math.abs(r.midi - s.midi)
				+
				Math.abs(r.start - s.start) / 100
				+
				Math.abs(rLen - sLen) / 100;

            leftCost =
                Math.min(
                    leftCost,
                    cost
                );
        }

	if(rightCost <= leftCost){

		console.log(
			"R",
			r.midi,
			rightCost,
			leftCost
		);

		right.push(r);

	}else{

		console.log(
			"L",
			r.midi,
			rightCost,
			leftCost
		);

		left.push(r);
	}    }

    return {
        right,
        left
    };
}

function canInput(){
    return isRecording;
}

function inputRouter(e, type){

    if(!canInput()) return;

    playSound(e);
}


function playSound(e){

    if(!canInput()) return;

    let szx =
        canvas.width;

    let kn =
        Number(midi_max)
        -
        Number(midi_min)
        + 1;

    let kw =
        (szx - 2 * mx)
        / kn;

    let p =
        Math.floor(
            (e.offsetX - mx)
            / kw
        )
        + Number(midi_min);

    if(
        e.offsetY >= my &&
        e.offsetY <= szy
    ){

        if(currentMidis.has(p)){
            return;
        }

        const x_bpm = num("x_bpm");

        const audioNow =
            playNoteNow(p);

		const latency =
			0.04;
			
		const t =
			(
				audioNow
				-
				baseAudioTime
				+
				latency
			)
			*
			x_bpm
			*
			ppq
			/ 60;

        recordData.push({
		    channel: 0,
            midi: p,
            start: t,
            stop: null,
			velocity: 127
        });

        currentMidis.add(p);
    }
}

function stopAllVoices(){

    for(const midi of activeVoices.keys()){
        stopNoteNow(midi);
    }
}

function pausePlayback(){

    pauseTick = getCurrentTick();

    stopAllVoices();

    cancelAnimationFrame(rafId);

    isPlaying = 0;
}

function playNoteNow(midi){

    const ctx =
    	audioContext;

    const osc =
        ctx.createOscillator();

    const gain =
        ctx.createGain();

    osc.frequency.value =
        midiToFreq(midi);

    osc.type = "triangle";

    osc.connect(gain);

    gain.connect(ctx.destination);

    const now =
        ctx.currentTime;

    gain.gain.setValueAtTime(
        0.0001,
        now
    );

    gain.gain.exponentialRampToValueAtTime(
        0.2,
        now + 0.01
    );

    osc.start(now);

    activeVoices.set(midi, {
        osc,
        gain
    });

    return now;
}


function stopNoteNow(midi){

    const voice =
        activeVoices.get(midi);

    if(!voice){
        return;
    }

	const now =
		audioContext.currentTime;

    voice.gain.gain.cancelScheduledValues(now);

	voice.gain.gain.setValueAtTime(
		0.2,
		now
	);

    voice.gain.gain.exponentialRampToValueAtTime(
        0.0001,
        now + 0.05
    );

    voice.osc.stop(now + 0.05);

    voice.osc.onended = () => {

        voice.osc.disconnect();

        voice.gain.disconnect();
    };

    activeVoices.delete(midi);
}

function offSound(){

    currentMidis.forEach(midi => {
		
		stopNoteNow(midi);
        
		const t = getCurrentTick();

        const x_bpm = num("x_bpm");

        const minDurSeconds = 0.05;

        const minDur =
            minDurSeconds *
            x_bpm *
            ppq / 60;

        for(
            let i = recordData.length - 1;
            i >= 0;
            i--
        ){

            const ev = recordData[i];

            if(
                ev.midi === midi &&
                ev.stop === null
            ){

                ev.stop = Math.max(
                    t,
                    ev.start + minDur
                );

                break;
            }
        }
    });

    currentMidis.clear();
}

function getCurrentTick(){

    const x_bpm = num("x_bpm");
	const now =
    audioContext.currentTime;

    return (
		now
        -
        baseAudioTime
    ) *
    x_bpm *
    ppq / 60;
}


function startPlayback(){

	const x_bpm = num("x_bpm");
	const now =
		audioContext.currentTime;

    baseAudioTime =
		now
		-
        (
            pauseTick /
            ppq *
            60 /
            x_bpm
        );
}


function playRecordNotes(tick){

	if(tick < prevTick){
        nextIndex = 0;
    }

    const x_bpm = num("x_bpm");

    const currentTick = Math.floor(tick);
    const previousTick = Math.floor(prevTick);

    const lookAheadTicks =
        0.1 * x_bpm * ppq / 60;

    while(nextIndex < recordData.length){

        let data = recordData[nextIndex];

        let midi  = data.midi;
        let start = data.start;
        let stop  = data.stop;

        if(start > currentTick + lookAheadTicks){
            break;
        }
		if(
			stop != null &&
			start >= previousTick &&
			start <= currentTick + lookAheadTicks
		){
            let durationTicks =
                Math.max(1, stop - start);

            let durationSeconds =
                durationTicks / ppq * 60 / x_bpm;

            playNote(midi, durationSeconds, start);
        }

        nextIndex++;
    }

    prevTick = tick;
}


function playScoreNotes(tick){

	if(tick < prevTick){
        nextIndex = 0;
    }

    let data0 = [];

	if (lessonSettings.hands === HANDS.BOTH){
        data0 = scoreData;

    }else if (lessonSettings.hands === HANDS.RIGHT){

        data0 = scoreRight;

	}else if (lessonSettings.hands === HANDS.LEFT){

        data0 = scoreLeft;

	}

	const x_bpm = num("x_bpm");

    const currentTick = Math.floor(tick);
    const previousTick = Math.floor(prevTick);

    const lookAheadTicks =
        0.1 * x_bpm * ppq / 60;

    while(nextIndex < data0.length){

        let data = data0[nextIndex];

        let midi  = data.midi;
        let start = data.start;
        let stop  = data.stop;

        if(start > currentTick + lookAheadTicks){
            break;
        }
		if(
			stop != null &&
			start >= previousTick &&
			start <= currentTick + lookAheadTicks
		){
            let durationTicks =
                Math.max(1, stop - start);

            let durationSeconds =
                durationTicks / ppq * 60 / x_bpm;

            playNote(midi, durationSeconds, start);
        }

        nextIndex++;
    }

    prevTick = tick;
}


function playNote(
    midi,
    duration,
    start
){

	const ctx2 = audioContext;

    const osc =
        ctx2.createOscillator();

    const gain =
        ctx2.createGain();

    osc.frequency.value =
        midiToFreq(midi);

    osc.type = "triangle";

    osc.connect(gain);

    gain.connect(ctx2.destination);

	const x_bpm = num("x_bpm");

    const when =
        baseAudioTime +
        start / ppq * 60 / x_bpm;

	const sustainEnd =
		Math.max(
			when + 0.01,
			when + duration - 0.02
		);

	gain.gain.setValueAtTime(
		0.0001,
		when
	);

	gain.gain.exponentialRampToValueAtTime(
		0.2,
		when + 0.01
	);

	gain.gain.setValueAtTime(
		0.2,
		sustainEnd
	);

	gain.gain.exponentialRampToValueAtTime(
		0.0001,
		when + duration
	);

    osc.start(when);

    osc.stop(when + duration);

    osc.onended = () => {

        osc.disconnect();
        gain.disconnect();
    };
}

function midiToFreq(midi){

    return 440 * Math.pow(
        2,
        (midi - 69) / 12
    );
}

function loopScore(){
	if (isPlaying == 0) return;
	const tick = getCurrentTick();
	const sv = lessonSettings.viewSelect;
	setVal("x_msr", Math.floor(tick/ticksPerMeasure+1));
	if (sv=="1"){
		lineScore(tick);
		if (enableScoreSound){
			playScoreNotes(tick);
		}
	}else if (sv=="2"){
		scrollScore(tick);
		if (enableScoreSound){
			playScoreNotes(tick);
		}
	}
    cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loopScore);
}

function loopRecord(){
	if (isPlaying == 0) return;
	const tick = getCurrentTick();
	const sv = lessonSettings.viewSelect;
	setVal("x_msr", Math.floor(tick/ticksPerMeasure+1));
	if (sv=="1"){
		lineRecord(tick);
		playRecordNotes(tick)
	}else if (sv=="2"){
		scrollRecord(tick);
		playRecordNotes(tick)
	}
    cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loopRecord);
}

function getVisibleLength(start, stop, tick){
    return (
        stop >= tick + measuresPerScreen*ticksPerMeasure*3/4
        ? (tick + measuresPerScreen*ticksPerMeasure*3/4 - start)/ticksPerMeasure
        : (stop - start)/ticksPerMeasure
    );
}

function getViewInfo(){

    let scoreViewData;

	if (lessonSettings.hands === HANDS.BOTH){
        scoreViewData = scoreData;
        midi_max = midi_max_b;
        midi_min = midi_min_b;
    }
    else if (lessonSettings.hands === HANDS.RIGHT){
        scoreViewData = scoreRight;
        midi_max = midi_max_r;
        midi_min = midi_min_r;
    }
    else if (lessonSettings.hands === HANDS.LEFT){
        scoreViewData = scoreLeft;
        midi_max = midi_max_l;
        midi_min = midi_min_l;
    }

    const kn = midi_max - midi_min + 1;
    const kw = szk / kn;

    return {
        scoreViewData,
        midi_min,
        midi_max,
		kn,
        kw
    };
}

function lineScore(tick){
	ctx.clearRect(0,0,canvas.width,canvas.height);
	szx = canvas.width;
	szy = canvas.height-2*my;
	szk = szx-2*mx;
	ctx.lineWidth=1;
	let scoreViewData;
	
	const view = getViewInfo();

	for(let l=0;l<Number(view.kn);l++){
		let k=Number(view.midi_min)+l;
		ctx.fillStyle=workingColors.oct[Math.floor(k/12)-1];
		ctx.fillRect(mx+l*view.kw,0,view.kw,my/2);
		ctx.fillStyle=workingColors.pc[k%12];
		ctx.fillRect(mx+l*view.kw,my/2,view.kw,my/2);
		if (k%12===1 || k%12===3 || k%12===6 || k%12===8 || k%12===10){
		ctx.fillStyle=workingColors.line[0];
		ctx.fillRect(mx+l*view.kw,my,view.kw,szy);
		}else if (k%12===0){
		ctx.beginPath();
		ctx.moveTo(mx+l*view.kw,my);
		ctx.lineTo(mx+l*view.kw,my+szy);
		ctx.strokeStyle=workingColors.line[1];
		ctx.stroke();
		}else if (k%12===5){
		ctx.beginPath();
		ctx.moveTo(mx+l*view.kw,my);
		ctx.lineTo(mx+l*view.kw,my+szy);
		ctx.strokeStyle=workingColors.line[2];
		ctx.stroke();
		}
	}

	if (tick<eott0){
	ctx.beginPath();
	ctx.moveTo(0,my+tick%(measuresPerScreen*ticksPerMeasure)*szy/(measuresPerScreen*ticksPerMeasure));
	ctx.lineTo(szx,my+tick%(measuresPerScreen*ticksPerMeasure)*szy/(measuresPerScreen*ticksPerMeasure));
	ctx.strokeStyle=workingColors.line[5];
	ctx.stroke();
	} else {
		isPlaying = 0;
	}

	ctx.beginPath();
	ctx.moveTo(0,my+szy);
	ctx.lineTo(mx+szk,my+szy);
	ctx.strokeStyle=workingColors.line[3];
	ctx.stroke();

	for(let m=0;m<eott0;m=m+ppq/ntvl*4){
		if(m%(ticksPerMeasure)===0 && m>=tick && m<(tick+measuresPerScreen*ticksPerMeasure)){
		let vmn0=m/ppq/bttl*ntvl/4+1;
		ctx.beginPath();
		ctx.moveTo(0,my+m%(measuresPerScreen*ticksPerMeasure)*szy/(measuresPerScreen*ticksPerMeasure));
		ctx.lineTo(mx+szk,my+m%(measuresPerScreen*ticksPerMeasure)*szy/(measuresPerScreen*ticksPerMeasure));
		ctx.strokeStyle=workingColors.line[3];
		ctx.stroke();
		if(vmn0 === highlightMeasure){
			ctx.fillStyle = workingColors.text[4];
			ctx.font = "bold 30px Arial";
		}else{
			ctx.fillStyle = workingColors.text[0];
			ctx.font = "25px Arial";
		}
		ctx.fillText(vmn0,0,my+25+m%(measuresPerScreen*ticksPerMeasure)*szy/(measuresPerScreen*ticksPerMeasure));
		}else if(m%(ppq/ntvl*4)===0 && m>=tick && m<(tick+measuresPerScreen*ticksPerMeasure)){
		ctx.beginPath();
		ctx.moveTo(mx,my+m%(measuresPerScreen*ticksPerMeasure)*szy/(measuresPerScreen*ticksPerMeasure));
		ctx.lineTo(mx+szk,my+m%(measuresPerScreen*ticksPerMeasure)*szy/(measuresPerScreen*ticksPerMeasure));
		ctx.strokeStyle=workingColors.line[4];
		ctx.stroke();
		}
	}

	for(let i=0;i<view.scoreViewData.length;i++){
		let midi = view.scoreViewData[i].midi;
		let start = view.scoreViewData[i].start;
		let stop = view.scoreViewData[i].stop;
		let track = view.scoreViewData[i].track;
		let channel = view.scoreViewData[i].channel;
		let n_id = view.scoreViewData[i].n_id;
		const dt = (start-tick)/ticksPerMeasure;
		const dp = (stop-tick)/ticksPerMeasure;
		const gt = getVisibleLength(
			start,
			stop,
			tick
		);

		let handColor =
			workingColors.hand[
				HAND_COLOR.SCORE_NOT_ASSIGNED
			];

		if(track == lessonSettings.handsTrackChannel.right.track
		 && channel == lessonSettings.handsTrackChannel.right.channel){
			handColor =
				workingColors.hand[
					HAND_COLOR.SCORE_RIGHT
				];
		}
		else if(track == lessonSettings.handsTrackChannel.left.track
		 && channel == lessonSettings.handsTrackChannel.left.channel){
			handColor =
				workingColors.hand[
					HAND_COLOR.SCORE_LEFT
				];
		}
		if (dp >=0 && dt < measuresPerScreen*3/4){
			const x0 = (midi-view.midi_min)*view.kw+mx;
			const x1 = (midi-view.midi_min+0.5)*view.kw+mx;
			const y = my+start%(measuresPerScreen*ticksPerMeasure)*szy/(measuresPerScreen*ticksPerMeasure);
			if (!isFinite(x0) || !isFinite(y) || !isFinite(gt)){
					continue;
				}

			ctx.fillStyle=workingColors.pc[midi%12];
			ctx.fillRect(x0,y,view.kw,gt*szy/measuresPerScreen);
			ctx.beginPath();
			ctx.arc(x1,y,view.kw/2,0,2*Math.PI,false);
			ctx.fillStyle = handColor;
			ctx.fill();
			getLabel(midi, n_id);
			ctx.font="20px Arial";
			if (nl!=""){
			ctx.fillStyle=workingColors.text[1];
			ctx.fillText(nl, x0+3, y+7);
			}
			if (nll!=""){
			ctx.fillStyle=workingColors.text[2];
			ctx.fillText(nll, mx, y);
			}
			if (nlr!=""){
			ctx.fillStyle=workingColors.text[3];
			ctx.fillText(nlr, mx+szk, y);
			}
		}
	}
};

			continue;
		}
		const dt = (start-tick)/ticksPerMeasure;
		const dp = (stop-tick)/ticksPerMeasure;

		if (dp > 0 && dt < measuresPerScreen*3/4){

			const x0 = (midi-midi_min)*view.kw+mx;
			const x1 = (midi-midi_min+0.5)*view.kw+mx;
			const y = my+start%(measuresPerScreen*ticksPerMeasure)*szy/(measuresPerScreen*ticksPerMeasure);
			const gt = getVisibleLength(
				start,
				stop,
				tick
			);

			console.log(showRecord);

			if (!isFinite(x0) || !isFinite(y) || !isFinite(gt) || !showRecord){
				continue;
			}

			ctx.fillStyle =
				workingColors.hand[
					HAND_COLOR.RECORD_BOTH_BAR
				];
			ctx.fillRect(
				x0 + view.kw/4,
				y,
				view.kw/2,
				gt*szy/measuresPerScreen
			);

			ctx.beginPath();
			ctx.fillStyle =
				workingColors.hand[
					HAND_COLOR.RECORD_BOTH_CIRCLE
				];
			ctx.fillStyle = workingColors.hand[2];
			ctx.arc(x1,y,view.kw/4,0,2*Math.PI,false);
			ctx.fill();
		}
	}
};


function scrollScore(tick){
	ctx.clearRect(0,0,canvas.width,canvas.height);
	szx = canvas.width;
	szy = canvas.height-2*my;
	szk=szx-2*mx;
	ctx.lineWidth=1;

	const view = getViewInfo();

	for(let l=0;l<Number(view.kn);l++){
		let k=Number(view.midi_min)+l;
		ctx.fillStyle=workingColors.oct[Math.floor(k/12)-1];
		ctx.fillRect(mx+l*view.kw,0,view.kw,my/2);
		ctx.fillStyle=workingColors.pc[k%12];
		ctx.fillRect(mx+l*view.kw,my/2,view.kw,my/2);
		if (k%12===1 || k%12===3 || k%12===6 || k%12===8 || k%12===10){
		ctx.fillStyle=workingColors.line[0];
		ctx.fillRect(mx+l*view.kw,my,view.kw,szy);
		}else if (k%12===0){
		ctx.beginPath();
		ctx.moveTo(mx+l*view.kw,my);
		ctx.lineTo(mx+l*view.kw,my+szy);
		ctx.strokeStyle=workingColors.line[1];
		ctx.stroke();
		}else if (k%12===5){
		ctx.beginPath();
		ctx.moveTo(mx+l*view.kw,my);
		ctx.lineTo(mx+l*view.kw,my+szy);
		ctx.strokeStyle=workingColors.line[2];
		ctx.stroke();
		}
	}

	for(let m=0;m<eott0;m=m+ppq/ntvl*4){
		if(m%(ticksPerMeasure)===0 && m>=tick && m<(tick+measuresPerScreen*ticksPerMeasure)){
		let vmn0=m/ticksPerMeasure+1;
		ctx.beginPath();
		ctx.moveTo(0,my+(m-tick)*szy/(measuresPerScreen*ticksPerMeasure));
		ctx.lineTo(mx+szk,my+(m-tick)*szy/(measuresPerScreen*ticksPerMeasure));
		ctx.strokeStyle=workingColors.line[3];
		ctx.stroke();
		if(vmn0 === highlightMeasure){
			ctx.fillStyle = workingColors.text[4];
			ctx.font = "bold 30px Arial";
		}else{
			ctx.fillStyle = workingColors.text[0];
			ctx.font = "25px Arial";
		}
		ctx.fillText(vmn0,0,my*1.6+(m-tick)*szy/(measuresPerScreen*ticksPerMeasure));
		}else if(m%(ppq/ntvl*4)===0 && m>=tick && m<(tick+measuresPerScreen*ticksPerMeasure)){
		ctx.beginPath();
		ctx.moveTo(mx,my+(m-tick)*szy/(measuresPerScreen*ticksPerMeasure));
		ctx.lineTo(mx+szk,my+(m-tick)*szy/(measuresPerScreen*ticksPerMeasure));
		ctx.strokeStyle=workingColors.line[4];
		ctx.stroke();
		}
	}

	for(let i=0;i<view.scoreViewData.length;i++){
		let midi = view.scoreViewData[i].midi;
		let start = view.scoreViewData[i].start;
		let stop = view.scoreViewData[i].stop;
		let track = view.scoreViewData[i].track;
		let channel = view.scoreViewData[i].channel;
		let n_id = view.scoreViewData[i].n_id;
		getLabel(midi, n_id);
		const dt = (start-tick)/ticksPerMeasure;
		const dp = (stop-tick)/ticksPerMeasure;
		let gt=(stop-start)/ticksPerMeasure;

		let handColor =
			workingColors.hand[
				HAND_COLOR.SCORE_NOT_ASSIGNED
			];

		if(track == lessonSettings.handsTrackChannel.right.track
		 && channel == lessonSettings.handsTrackChannel.right.channel){
			hhandColor =
				workingColors.hand[
					HAND_COLOR.SCORE_RIGHT
				];
		}
		else if(track == lessonSettings.handsTrackChannel.left.track
		 && channel == lessonSettings.handsTrackChannel.left.channel){
			handColor =
				workingColors.hand[
					HAND_COLOR.SCORE_LEFT
				];
		}
		
		if (dp > -1/4 && dt < measuresPerScreen){
			const x0 = (midi-view.midi_min)*view.kw+mx;
			const x1 = (midi-view.midi_min+0.5)*view.kw+mx;
			const y = my+dt*szy/measuresPerScreen;
			if (!isFinite(x0) || !isFinite(y) || !isFinite(gt) || !showRecord){
					continue;
				}
			ctx.fillStyle=workingColors.pc[midi%12];
			ctx.fillRect(x0,y,view.kw,gt*szy/measuresPerScreen);
			ctx.beginPath();
			ctx.arc(x1,y,view.kw/2,0,2*Math.PI,false);
			ctx.fillStyle=handColor;
			ctx.fill();
			ctx.fillStyle="black";
			ctx.font="20px Arial";
			if (nl!=""){
			ctx.fillStyle=workingColors.text[1];
			ctx.fillText(nl, x0+3, y+7);
			}
			if (nll!=""){
			ctx.fillStyle=workingColors.text[2];
			ctx.fillText(nll, mx, y);
			}
			if (nlr!=""){
			ctx.fillStyle=workingColors.text[3];
			ctx.fillText(nlr, mx+szk, y);
			}
		}
	}
};

function scrollRecord(tick){

	if(!showRecord) return;

	scrollScore(tick);
	
	const view = getViewInfo();
	
	for(let i=0; i<recordData.length; i++){
		let midi = recordData[i].midi;
		let start = recordData[i].start;
		let stop = recordData[i].stop;
		if(stop == null){
			continue;
		}
		const dt = (start-tick)/ticksPerMeasure;
		const dp = (stop-tick)/ticksPerMeasure;
		let gt=(stop-start)/ticksPerMeasure;

		if (dp > 0 && dt < measuresPerScreen){

			const x0 = (midi-view.midi_min)*view.kw+mx;
			const x1 = (midi-view.midi_min+0.5)*view.kw+mx;
			const y = my+dt*szy/measuresPerScreen;

			if (!isFinite(x0) || !isFinite(y) || !isFinite(gt)){
				continue;
			}
			ctx.fillStyle =
				workingColors.hand[
					HAND_COLOR.RECORD_BOTH_BAR
				];
			ctx.fillRect(
				x0 + view.kw/4,
				y,
				view.kw/2,
				gt*szy/measuresPerScreen
			);
			ctx.beginPath();
			ctx.fillStyle =
				workingColors.hand[
					HAND_COLOR.RECORD_BOTH_CIRCLE
				];
			ctx.arc(x1,y,view.kw/4,0,2*Math.PI,false);
			ctx.fill();
		}
	}
};

function calcPitchAccuracy(diffData){

    let correct = 0;
    let count = 0;

    for(const d of diffData){

        if(d.missed || d.extra){
            continue;
        }

        count++;

        if(d.pitchDiff === 0){
            correct++;
        }
    }

    if(count === 0){
        return 0;
    }

    return Math.round(correct / count * 100);
}

function calcAttackAccuracy(diffData){

    let total = 0;
	let count = 0;

	for(const d of diffData){

        if(d.missed || d.extra){
            continue;
        }

        count++;

		const err =
            Math.abs(d.attackDiff);

        let score;

        if(err <= ppq * 0.05){

            score = 100;

        }else if(err <= ppq * 0.10){

            score = 90;

        }else if(err <= ppq * 0.20){

            score = 70;

        }else if(err <= ppq * 0.30){

            score = 40;

        }else{

            score = 0;
        }

        total += score;
    }

    return count ? Math.round(total / count) : 0;
}

function calcReleaseAccuracy(diffData){

    let total = 0;
	let count = 0;

	for(const d of diffData){

        if(d.missed || d.extra){
            continue;
        }

        count++;

        const err =
            Math.abs(d.releaseDiff);

        let score;

        if(err <= ppq * 0.05){

            score = 100;

        }else if(err <= ppq * 0.10){

            score = 90;

        }else if(err <= ppq * 0.20){

            score = 70;

        }else if(err <= ppq * 0.30){

            score = 40;

        }else{

            score = 0;
        }

        total += score;
    }

    return count ? Math.round(total / count) : 0;
}


function calcVelocityAccuracy(diffData){

    let total = 0;
	let count = 0;

	for(const d of diffData){

        if(d.missed || d.extra){
            continue;
        }

        count++;

        const err =
            Math.abs(d.velocityDiff);

        let score;

        if(err <= 5){

            score = 100;

        }else if(err <= 10){

            score = 90;

        }else if(err <= 20){

            score = 70;

        }else if(err <= 40){

            score = 40;

        }else{

            score = 0;
        }

        total += score;
    }

    return count ? Math.round(total / count) : 0;
}


function calcOverallAccuracy(diffData){

	const pitchAccuracy = Math.round(calcPitchAccuracy(diffData));
	const attackAccuracy = Math.round(calcAttackAccuracy(diffData));
	const releaseAccuracy = Math.round(calcReleaseAccuracy(diffData));
	const velocityAccuracy = Math.round(calcVelocityAccuracy(diffData));

	const Overall = Math.round(
		0.5 * pitchAccuracy +
		0.25 * attackAccuracy +
		0.2 * releaseAccuracy +
		0.05 * velocityAccuracy
	);

	return Overall;
}

function drawGraph(
    diffData,
    key,
    title,
    offsetY,
    color,
    scaleY,
    showMeasureLabel
){
	
    const graphHeight = 100;

	const titleHeight = 30;

    const w = canvas.width - 2 * mx;

    const centerY =
        offsetY + graphHeight / 2;

    // タイトル
    ctx.fillStyle = "black";

    ctx.font = "20px sans-serif";

    ctx.fillText(
        title,
        50,
        offsetY + 20
    );

    // 中央線
    ctx.strokeStyle = "#888";

    ctx.beginPath();

    ctx.moveTo(
        mx,
        centerY
    );

    ctx.lineTo(
        mx + w,
        centerY
    );

    ctx.stroke();

	const maxTick =
		Math.max(
			...scoreData.map(n => n.start)
		);
		
	// --------------------
    // 小節線だけ描画
    // --------------------

		ctx.strokeStyle = "#ddd";

		ctx.fillStyle = "black";
	
		const drawnMeasures =
		new Set();

	for(let i = 0; i < diffData.length; i++){

		const measure =
			diffData[i].measure;

		if(
			drawnMeasures.has(
				measure
			)
		){
			continue;
		}

		drawnMeasures.add(
			measure
		);

		const x = mx + diffData[i].tick / maxTick * w;

		const maxMeasure =
    		diffData[diffData.length - 1].measure;

		const maxLabels = 30;

		const measureStep =
			Math.max(
				1,
				Math.ceil(maxMeasure / maxLabels)
			);

		if(
			showMeasureLabel
			&&
			(measure - 1) % measureStep === 0
		){
			ctx.fillText(
				measure,
				x,
				offsetY + graphHeight
			);
		}

		ctx.beginPath();

		ctx.moveTo(
			x,
			offsetY + titleHeight
		);

		ctx.lineTo(
			x,
			offsetY +
			(graphHeight - titleHeight)
		);

		ctx.stroke();
	}
    // --------------------
    // 折れ線描画
    // --------------------

    ctx.strokeStyle = color;

    ctx.fillStyle = color;

    ctx.lineWidth = 2;

    ctx.beginPath();

	for(let i = 0; i < diffData.length; i++){

		const x =
			mx +
			diffData[i].tick
			/ maxTick
			* w;

		const y =
			centerY
			-
			diffData[i][key] * scaleY;

			// 点
			ctx.fillRect(
				x - 2,
				y - 2,
				4,
				4
			);

			// 折れ線
			if(i === 0){

				ctx.moveTo(x, y);

			}else{

				ctx.lineTo(x, y);
			}
		}

    ctx.stroke();
}

function drawPedalGraph(
    pedalData,
    title,
    offsetY,
	color,
    showMeasureLabel

){

	if(pedalData.length === 0){
    return;
	}
	
	const pedalGraphData = [];

	for(const p of pedalData){

		pedalGraphData.push({

			cc: p.cc,

			measure:
				Math.floor(
					p.start / ticksPerMeasure
				) + 1,

			tick: p.start,

			pedalValue: p.value
		});
	}

    const graphHeight = 100;

	const titleHeight = 30;

    const w = canvas.width - 2 * mx;

	const topY = offsetY + 40;

	const bottomY = offsetY + 80;

	const maxTick =
		Math.max(
			...scoreData.map(n => n.start)
		);		

	// タイトル

	ctx.fillStyle = "black";

    ctx.font = "20px sans-serif";

    ctx.fillText(
        title,
        50,
        offsetY + 20
    );
		
	// --------------------
    // 小節線だけ描画
    // --------------------
	ctx.strokeStyle = "#ddd";

	ctx.fillStyle = "black";

	const totalMeasures =
		Math.ceil(
			maxTick / ticksPerMeasure
		);

	for(
		let m = 1;
		m <= totalMeasures;
		m++
	){

		const tick =
			(m - 1) * ticksPerMeasure;

		const x =
			mx +
			tick / maxTick * w;

		if(showMeasureLabel){

			ctx.fillText(
				m,
				x,
				offsetY + graphHeight
			);
		}

		ctx.beginPath();

		ctx.moveTo(
			x,
			offsetY + titleHeight
		);

		ctx.lineTo(
			x,
			offsetY + (graphHeight - titleHeight)
		);

		ctx.stroke();
	}

    // --------------------
    // 折れ線描画
    // --------------------

    ctx.strokeStyle = color;

    ctx.fillStyle = color;

    ctx.lineWidth = 2;

	
	let prevY = null;

	ctx.beginPath();

	for(let i = 0; i < pedalGraphData.length; i++){

		const x =
			mx +
			pedalGraphData[i].tick / maxTick * w;

		const y =
			bottomY
			-
			pedalGraphData[i].pedalValue / 127
			*
			(bottomY - topY);

		if(i === 0){

			ctx.moveTo(x, y);

		}else{

			ctx.lineTo(x, prevY);
			ctx.lineTo(x, y);
		}

		prevY = y;
	}

	const lastX =
		mx + w;

	ctx.lineTo(
		lastX,
		prevY
	);

	ctx.stroke();
}

function matchNotes(scoreData, recordData){

    const m = scoreData.length;
    const n = recordData.length;

    const dp = [];
	const MISS_COST = 50;

    for(let i=0; i<=m; i++){

        dp[i] = [];

        for(let j=0; j<=n; j++){

            dp[i][j] = Infinity;
        }
    }

    dp[0][0] = 0;

    for(let i=0; i<=m; i++){

        for(let j=0; j<=n; j++){

            if(i < m && j < n){

                const s = scoreData[i];
                const r = recordData[j];

                const pitchCost =
                    Math.abs(s.midi - r.midi);

                const timeCost =
                    Math.abs(s.start - r.start) / 100;

				const durationCost =
					Math.abs(
						(s.stop - s.start)
						-
						(r.stop - r.start)
					) / 100;

				const matchCost =
					pitchCost * 10 +
					timeCost +
					durationCost;

                dp[i+1][j+1] =
                    Math.min(
                        dp[i+1][j+1],
                        dp[i][j] + matchCost
                    );
            }

            // 楽譜側欠落
            if(i < m){

                dp[i+1][j] =
                    Math.min(
                        dp[i+1][j],
                        dp[i][j] + MISS_COST
                    );
            }

            // 余計な音
            if(j < n){

                dp[i][j+1] =
                    Math.min(
                        dp[i][j+1],
                        dp[i][j] + MISS_COST
                    );
            }
        }
    }

    const pairs = [];

    let i = m;
    let j = n;

    while(i > 0 || j > 0){

        if(
            i > 0 &&
            j > 0
        ){

            const s = scoreData[i-1];
            const r = recordData[j-1];

            const pitchCost =
                Math.abs(s.midi - r.midi);

            const timeCost =
                Math.abs(s.start - r.start) / 100;

			const durationCost =
				Math.abs(
					(s.stop - s.start)
					-
					(r.stop - r.start)
				) / 100;

			const matchCost =
				pitchCost * 10 +
				timeCost +
				durationCost;

            if(
                Math.abs(
                    dp[i][j] -
                    (dp[i-1][j-1] + matchCost)
                ) < 0.0001
            ){

                pairs.unshift({

                    scoreIndex: i-1,
                    recordIndex: j-1,

                    score: s,
                    record: r

                });

                i--;
                j--;

                continue;
            }
        }

        if(
            i > 0 &&
            Math.abs(
                dp[i][j] -
                (dp[i-1][j] + MISS_COST)
            ) < 0.0001
        ){

            pairs.unshift({

                scoreIndex: i-1,
                recordIndex: null,

                score: scoreData[i-1],
                record: null

            });

            i--;

            continue;
        }

        if(j > 0){

            pairs.unshift({

                scoreIndex: null,
                recordIndex: j-1,

                score: null,
                record: recordData[j-1]

            });

            j--;
        }
    }

    return pairs;

	const matched =
		pairs.filter(
			p => p.score && p.record
		);

	console.log(
		"matched",
		matched.length
	);

}


function createDiffData(pairs){

    diffData = [];   // ←追加

	for(const pair of pairs){

		// 弾き忘れ
		if(
			pair.score != null &&
			pair.record == null
		){

			diffData.push({

				missed: true,

				tick:
					pair.score.start,

				measure:
					Math.floor(
						pair.score.start /
						ticksPerMeasure
					) + 1
			});

			continue;
		}

		// 余計な音
		if(
			pair.score == null &&
			pair.record != null
		){

			diffData.push({

				extra: true,

				tick:
					pair.record.start,

				measure:
					Math.floor(
						pair.record.start /
						ticksPerMeasure
					) + 1
			});

			continue;
		}

		const s = pair.score;
		const r = pair.record;

		diffData.push({

			tick: s.start,

			pitchDiff:
				r.midi - s.midi,

			attackDiff:
				r.start - s.start,

			releaseDiff:
				r.stop - s.stop,

			velocityDiff:
				r.velocity -
				s.velocity,

			measure:
				Math.floor(
					s.start /
					ticksPerMeasure
				) + 1
		});
	}

	diffData.sort(
		(a,b) => a.tick - b.tick
	);

    return diffData;

}

function createMeasureStats(diffData){

    const stats = {};

    for(const d of diffData){
    
        const m = d.measure;

        if(!stats[m]){

			stats[m] = {
				measure: m,
				missed: 0,
				extra: 0,
				pitch: 0,
				attack: 0,
				release: 0,
				velocity: 0,
				total: 0
			};
        }

		if(d.missed){
			stats[m].missed++;
			stats[m].total += 10;
			continue;
		}

		if(d.extra){
			stats[m].extra++;
			stats[m].total += 5;
			continue;
		}

		if(Math.abs(d.pitchDiff) > 0){
			stats[m].pitch++;
			stats[m].total += 8;
		}

		if(Math.abs(d.attackDiff) > ppq/8){
			stats[m].attack++;
			stats[m].total += 1;
		}

		if(Math.abs(d.releaseDiff) > ppq/8){
			stats[m].release++;
			stats[m].total += 1;
		}

		if(Math.abs(d.velocityDiff) > 20){
			stats[m].velocity++;
			stats[m].total += 1;
		}
	}

    return Object.values(stats);
}

function createMeasureRanking(diffData){

    const stats =
        createMeasureStats(diffData);

    stats.sort(
        (a,b) => b.total - a.total
    );

    return stats;
	
}

function onMIDISuccess(midiAccess){

    for(let input of midiAccess.inputs.values()){

        input.onmidimessage =
            onMIDIMessage;
    }
}

function onMIDIMessage(event){

    if(!canInput()) return;

    inputRouter(event, "midi");

    const [status, data1, data2] = event.data;

    const command = status & 0xf0;
	const channel = status & 0x0f;
	const audioNow =
	    audioContext.currentTime;

    const x_bpm = num("x_bpm");

	const latency = 0.04;

	const t =
	(
		audioNow
		- baseAudioTime
		+ latency
	)
	* x_bpm
	* ppq
	/ 60;

    // ペダル
    if(command === 0xb0){
		const cc = data1;
        const value = data2;

		console.log(
				"CC",
				data1,
				"value",
				data2
			);

		if(
			cc === 64 ||
			cc === 66 ||
			cc === 67
		){
			if(isRecording){

				pedalData.push({
					channel,
					cc,
					value,
					start: t
				});
			}
		}

		console.log(pedalData);
	}

	// Note On
	if(command === 0x90 && data2 > 0){

		const note = data1;
		const velocity = data2;

		// 音は常に鳴らす
		noteOn(note, velocity);

		// 録音中だけ記録する
		if(isRecording){

			const noteData = {
				channel,
				midi: note,
				start: t,
				stop: null,
				velocity
			};

			recordData.push(noteData);

			const key =
				channel + "_" + note;

			activeNotes[key] = noteData;
		}
	}
	// Note Off
	if(
		command === 0x80 ||
		(
			command === 0x90 &&
			data2 === 0
		)
	){

		const note = data1;

		noteOff(note);

		if(isRecording){

			const key =
				channel + "_" + note;

			if(activeNotes[key]){

				activeNotes[key].stop = t;

				delete activeNotes[key];
			}
		}
	}
}

function noteToFreq(note){

    return 440 *
        Math.pow(
            2,
            (note - 69) / 12
        );
}

function noteOn(note, velocity){

	console.log(status, note, velocity);

    if(oscillators[note]){

        oscillators[note].stop();

        delete oscillators[note];
    }

    const osc =
        audioContext.createOscillator();

    const gain =
        audioContext.createGain();

    osc.type = "sine";

    osc.frequency.value =
        noteToFreq(note);

    gain.gain.value =
        velocity / 127 * 0.2;

    osc.connect(gain);
    gain.connect(audioContext.destination);

    osc.start();

    oscillators[note] = osc;
}


function noteOff(note){

    const osc = oscillators[note];

    if(!osc) return;

    osc.stop();

    delete oscillators[note];
}

//
// Save Midi
//

function createMidiEvents(noteData, pedalData1=[]){

    const events = [];

    for(const n of noteData){

        events.push({
            tick: Math.round(n.start),
            type: "on",
            channel: n.channel,
            note: n.midi,
            velocity: n.velocity
        });

        if(n.stop != null){

            events.push({
                tick: Math.round(n.stop),
                type: "off",
                channel: n.channel,
                note: n.midi
            });
        }
    }

    for(const p of pedalData1){

        events.push({
            tick: Math.round(p.start),
            type: "cc",
            channel: p.channel,
            cc: p.cc,
            value: p.value
        });
    }

    events.sort(
        (a,b) => a.tick - b.tick
    );

    return events;
}

function writeVLQ(value){

    let buffer = value & 0x7F;
    const bytes = [];

    while((value >>= 7)){

        buffer <<= 8;
        buffer |=
            ((value & 0x7F) | 0x80);
    }

    while(true){

        bytes.push(buffer & 0xFF);

        if(buffer & 0x80){

            buffer >>= 8;

        }else{

            break;
        }
    }

    return bytes;
}

function createTrackData(
    noteData,
    pedalData1=[]
){

    const track = [];

	//Program Change (C0)
	track.push(
		0x00,
		0xC0,
		0x00
	);

    let prevTick = 0;

	const events =
    createMidiEvents(
        noteData,
        pedalData1
    );

    for(const e of events){

        const delta =
            e.tick - prevTick;

        prevTick = e.tick;

        track.push(
            ...writeVLQ(delta)
        );

        if(e.type === "on"){

            track.push(
                0x90 | e.channel,
                e.note,
                e.velocity
            );
        }

        if(e.type === "off"){

            track.push(
                0x80 | e.channel,
                e.note,
                0
            );
        }

        if(e.type === "cc"){

            track.push(
                0xB0 | e.channel,
                e.cc,
                e.value
            );
        }
    }

    // End Of Track
    track.push(
        0x00,
        0xFF,
        0x2F,
        0x00
    );

    return track;
}

function createMetaTrackData(){

    const track = [];

    const mpqn =
        Math.round(
            60000000 / bpm
        );

    track.push(
        0x00,
        0xFF,
        0x51,
        0x03,
        (mpqn >> 16) & 255,
        (mpqn >> 8) & 255,
        mpqn & 255
    );

    track.push(
        0x00,
        0xFF,
        0x58,
        0x04,
        bttl,
        Math.round(Math.log2(ntvl)),
        24,
        8
    );

    track.push(
        0x00,
        0xFF,
        0x2F,
        0x00
    );

    return track;
}

function addTrack(
    bytes,
    trackData
){

    const len =
        trackData.length;

    bytes.push(
        0x4d,0x54,0x72,0x6b,
        (len>>24)&255,
        (len>>16)&255,
        (len>>8)&255,
        len&255
    );

    bytes.push(...trackData);
}

function saveMidi(){

	console.log(recordData[0].channel);

	const scoreRight =
		scoreData.filter(
			n =>
				n.track === lessonSettings.handsTrackChannel.right.track &&
				n.channel === lessonSettings.handsTrackChannel.right.channel
		);

	const scoreLeft =
		scoreData.filter(
			n =>
				n.track === lessonSettings.handsTrackChannel.right.track &&
				n.channel === lessonSettings.handsTrackChannel.right.channel
		);
		
    const bytes = [];

    // MThd
    bytes.push(
        0x4d,0x54,0x68,0x64,
        0x00,0x00,0x00,0x06,
        0x00,0x01,
        0x00,0x04,
        (ppq>>8)&255,
        ppq&255
    );

	addTrack(
		bytes,
		createMetaTrackData()
	);

	addTrack(
		bytes,
		createTrackData(scoreRight)
	);

	addTrack(
		bytes,
		createTrackData(scoreLeft)
	);

	addTrack(
		bytes,
		createTrackData(recordData,pedalData)
	);

	const blob =
        new Blob(
            [new Uint8Array(bytes)],
            {type:"audio/midi"}
        );

    const url =
        URL.createObjectURL(blob);

    const a =
        document.createElement("a");

const songName =
    val("song1");

	const fileName =
    `${songName}-${getCurrentDateTimeString()}.mid`;

	a.href = url;
    a.download = fileName;	
    a.click();
}

function getCurrentDateTimeString(){

    const now = new Date();

    const y = now.getFullYear();

    const m = String(
        now.getMonth() + 1
    ).padStart(2, "0");

    const d = String(
        now.getDate()
    ).padStart(2, "0");

    const h = String(
        now.getHours()
    ).padStart(2, "0");

    const min = String(
        now.getMinutes()
    ).padStart(2, "0");

    const s = String(
        now.getSeconds()
    ).padStart(2, "0");

    return `${y}${m}${d}-${h}${min}${s}`;
}


function getDateTimeString(ms){

    const d = new Date(ms);

    const y = d.getFullYear();

    const m = String(
        d.getMonth() + 1

function trackChannelInfo(){

	ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.font = "15px Arial";
    ctx.fillStyle = "black";
	
	const infoMap = {};
	
	for(const note of scoreData){

		const key =
			note.track + "_" +
			note.channel;

		if(!infoMap[key]){

			infoMap[key] = {

				track:
					note.track,

				channel:
					note.channel,

				sum: 0,

				count: 0
			};
		}

		infoMap[key].sum +=
			note.midi;

		infoMap[key].count++;
	}

		const rows =
		Object.values(infoMap);

	rows.forEach(row => {

		row.avg =
			row.sum /
			row.count;
	});
	
	const channelInstrument = {};

	rawMidi.tracks.forEach(track => {

		track.forEach(event => {

			if(event.type === "programChange"){

				channelInstrument[
					event.channel
				] =
					event.programNumber;
			}

		});

	});

	console.log(channelInstrument);

	rows.forEach(row => {

		const instNumber =
			channelInstrument[row.channel];

		row.instrument =
			instName[instNumber] || "-";

	});
	ctx.fillText("Color",100,50);
	ctx.fillText("Hand",160,50);
	ctx.fillText("Track",280,50);
	ctx.fillText("Channel",360,50);
	ctx.fillText("Notes",460,50);
	ctx.fillText("Avg MIDI",540,50);
	ctx.fillText("Instrument",660,50);

		rows.forEach((row,i)=>{

		const y =
			30*(i+1)+50;

		let handColor =
			workingColors.hand[
				HAND_COLOR.SCORE_NOT_ASSIGNED
			];
		let handName = HANDS_LABEL[HANDS.OTHER];;

		if(row.track == lessonSettings.handsTrackChannel.right.track && 
		row.channel == lessonSettings.handsTrackChannel.right.channel){
			handColor =
				workingColors.hand[
					HAND_COLOR.SCORE_RIGHT
				];
			handName = HANDS_LABEL[HANDS.RIGHT];
		}
		else if(row.track == lessonSettings.handsTrackChannel.left.track && 
		row.channel == lessonSettings.handsTrackChannel.left.channel){
			handColor =
				workingColors.hand[
					HAND_COLOR.SCORE_LEFT
				];
			handName = HANDS_LABEL[HANDS.LEFT];
		}
		
		ctx.fillStyle = handColor;

		ctx.beginPath();
		ctx.arc(
			110,
			y-5,
			10,
			0,
			2*Math.PI
		);

		ctx.fill();

		ctx.fillStyle =
			"black";

		ctx.fillText(
			handName,
			160,
			y
		);

		ctx.fillText(
				row.track,
				280,
				y
			);

		ctx.fillText(
			row.channel,
			360,
			y
		);

		ctx.fillText(
			row.count,
			460,
			y
		);

		ctx.fillText(
			row.avg.toFixed(1),
			540,
			y
		);

		ctx.fillText(
			row.instrument,
			660,
			y
		);

	});
}

async function downloadTsv(){

    const text =
        await (await fetch("./data/SongList.tsv")).text();

    const files = text.trim().split("\n");

	let html = `
		<h2>Download Files</h2>

		<table border="1" cellpadding="5">
		<tr>
			<th>Composer</th>
			<th>Title</th>
			<th>MIDI</th>
			<th>TSV</th>
		</tr>
		`;

    for(const line of files){

        const cols = line.split("\t");

        const composer = cols[0];
        const title    = cols[1];
        const file     = cols[2];

        html += `
            <tr>
                <td>${composer}</td>
                <td>${title}</td>
                <td>
                    <a href="./data/${file}.mid" download>
                        Download
                    </a>
                </td>
                <td>
                    <a href="./data/${file}.tsv" download>
                        Download
                    </a>
                </td>
            </tr>
        `;
    }

    html += "</table>";

    $("downloadArea").innerHTML = html;
}
